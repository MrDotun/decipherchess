<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proprietress Master Console | MCPS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --emerald: #004d40; --gold: #c5a059; --bg: #f0f4f3; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .header { background: var(--emerald); color: white; padding: 30px; border-radius: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 6px solid var(--gold); }
        
        /* Grid Layout for Classes */
        .grade-section { background: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grade-title { color: var(--emerald); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .arms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .arm-card { border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; background: #fafafa; transition: 0.3s; }
        .arm-card:hover { border-color: var(--gold); background: white; }
        
        .pin-display { font-family: monospace; font-size: 1.2rem; font-weight: bold; color: var(--gold); background: #fdfbf7; padding: 5px 10px; border-radius: 4px; border: 1px dashed var(--gold); }
        .btn-gen { background: var(--emerald); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; margin-top: 10px; width: 100%; }
        
        .badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; color: white; text-transform: uppercase; }
        .blue { background: #1e40af; } .green { background: #15803d; } .red { background: #b91c1c; } .white { background: #64748b; color: white; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0;">MARYLAND CONVENT</h1>
            <p style="margin:0; opacity:0.8;">Proprietress Administrative Master Console</p>
        </div>
        <div style="text-align:right">
            <button onclick="location.reload()" style="background:var(--gold); color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">REFRESH SYSTEM</button>
        </div>
    </div>

    <div id="schoolGrid">
        </div>
</div>

<script>
    const grades = ["Grade 1", "Grade 2", "Grade 3", "Grade 4", "Grade 5", "Grade 6"];
    const arms = ["Blue", "Green", "Red", "White"];
    
    function initSchool() {
        const grid = document.getElementById('schoolGrid');
        let html = "";

        grades.forEach(grade => {
            html += `
                <div class="grade-section">
                    <h3 class="grade-title"><i class="bi bi-mortarboard-fill"></i> ${grade} Directory</h3>
                    <div class="arms-grid">
            `;
            
            arms.forEach(arm => {
                // Unique ID for each arm's PIN
                const armID = `${grade.replace(' ', '')}${arm}`;
                // Generate a starting PIN (In a real app, this pulls from a database)
                const startPin = Math.floor(1000 + Math.random() * 9000);
                
                html += `
                    <div class="arm-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <strong>${arm} Arm</strong>
                            <span class="badge ${arm.toLowerCase()}">${arm}</span>
                        </div>
                        <p style="font-size: 0.8rem; color: #666; margin: 10px 0;">Teacher Access PIN:</p>
                        <div style="text-align:center;">
                            <span class="pin-display" id="pin_${armID}">${startPin}</span>
                        </div>
                        <button class="btn-gen" onclick="generateNewPin('pin_${armID}', '${grade} ${arm}')">
                            <i class="bi bi-arrow-clockwise"></i> Reset Arm PIN
                        </button>
                    </div>
                `;
            });

            html += `</div></div>`;
        });
        
        grid.innerHTML = html;
    }

    function generateNewPin(id, className) {
        const newPin = Math.floor(1000 + Math.random() * 9000);
        document.getElementById(id).innerText = newPin;
        // Visual feedback
        const card = document.getElementById(id).closest('.arm-card');
        card.style.borderColor = "var(--gold)";
        setTimeout(() => card.style.borderColor = "#e2e8f0", 1000);
        
        console.log(`Updated PIN for ${className} to ${newPin}`);
    }

    // Run on load
    initSchool();
</script>
</body>
</html>
