<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Auth | MCPS</title>
    <style>
        body { font-family: sans-serif; background: #004d40; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 320px; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 1.5rem; text-align: center; letter-spacing: 5px; }
        button { background: #c5a059; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #content { display: none; background: #f4f4f4; width: 100vw; height: 100vh; padding: 40px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="login-card" id="lock">
        <h2 style="color:#004d40">Proprietress Login</h2>
        <p>Enter Master PIN</p>
        <input type="password" id="pin" maxlength="4" placeholder="****">
        <button onclick="auth()">ACCESS ADMIN</button>
    </div>

    <div id="content">
        <h1>Admin Command Centre</h1>
        <div style="background:white; padding:20px; border-radius:10px;">
            <h3>School Statistics</h3>
            <p>Total Revenue: <b>₦14.2M</b></p>
            <p>Unpaid Students: <b>142</b></p>
            <button onclick="location.reload()" style="width:auto; padding:10px;">Logout</button>
        </div>
    </div>

    <script>
        function auth() {
            if(document.getElementById('pin').value === "0000") {
                document.getElementById('lock').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.body.style.background = "#f4f4f4";
            } else { alert("Unauthorized Access"); }
        }
    </script>
</body>
</html>
