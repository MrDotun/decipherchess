<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Principal Admin | Maryland Convent</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --emerald: #004d40; --gold: #c5a059; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; }
        .admin-box { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .class-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; width: 80px; text-align: center; }
        button { background: var(--emerald); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2 style="color:var(--emerald)"><i class="bi bi-shield-lock"></i> Master PIN Manager</h2>
    <p>Set the access codes for each class teacher below.</p>
    <div id="classList"></div>
    <button onclick="saveAllPins()" style="width:100%; margin-top:20px; background:var(--gold)">SAVE ALL PINS TO CLOUD</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBX_ysaY_ShUG1kY-ZR8xnaZ01SlZLUblw",
        authDomain: "assignments-de95a.firebaseapp.com",
        projectId: "assignments-de95a",
        appId: "1:1088073398299:web:619884c11554d262dba0be"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const grades = ["Grade 1", "Grade 2", "Grade 3", "Grade 4", "Grade 5", "Grade 6"];
    const arms = ["Blue", "Green", "Red", "White"];

    // Generate the list of all possible classes
    const listDiv = document.getElementById('classList');
    let html = "";
    grades.forEach(g => {
        arms.forEach(a => {
            const id = (g + a).replace(" ", "");
            html += `<div class="class-row">
                <span><b>${g} ${a}</b></span>
                <input type="text" id="pin-${id}" placeholder="PIN" maxlength="4">
            </div>`;
        });
    });
    listDiv.innerHTML = html;

    window.saveAllPins = async function() {
        for (const g of grades) {
            for (const a of arms) {
                const id = (g + a).replace(" ", "");
                const val = document.getElementById(`pin-${id}`).value;
                if(val) {
                    await setDoc(doc(db, "pins", id), { code: val });
                }
            }
        }
        alert("All Class PINs updated in Cloud!");
    }
</script>
</body>
</html>
