<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proprietress Master Console | MCPS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --emerald: #004d40; --gold: #c5a059; --bg: #f0f4f3; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; }
        
        /* ADMIN LOGIN OVERLAY */
        #adminLock { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: radial-gradient(circle, #004d40, #002d26); 
            display: flex; align-items: center; justify-content: center; z-index: 9999; 
        }
        .vault-box { 
            background: white; padding: 40px; border-radius: 20px; text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 3px solid var(--gold);
        }
        .vault-box input { 
            font-size: 2.5rem; width: 180px; text-align: center; letter-spacing: 10px; 
            border: 2px solid #ddd; border-radius: 10px; margin: 20px 0; display: block;
        }

        .container { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        .header { background: var(--emerald); color: white; padding: 30px; border-radius: 15px; margin-bottom: 30px; border-bottom: 6px solid var(--gold); }
        
        /* MASTER EDIT MODE STYLES */
        .master-badge { background: var(--gold); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .edit-row { background: #fffbeb !important; border: 1px solid var(--gold) !important; }
    </style>
</head>
<body>

<div id="adminLock">
    <div class="vault-box">
        <i class="bi bi-shield-lock-fill" style="font-size: 4rem; color: var(--emerald);"></i>
        <h2 style="margin: 10px 0;">Proprietress Vault</h2>
        <p style="color: #666;">Enter Master PIN to Access School Records</p>
        <input type="password" id="masterGate" maxlength="4" placeholder="****">
        <button onclick="unlockVault()" style="background: var(--emerald); color: white; padding: 15px 40px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%;">ACCESS CONSOLE</button>
    </div>
</div>

<div class="container" id="adminDashboard">
    <div class="header">
        <div>
            <h1 style="margin:0;">MARYLAND CONVENT <span class="master-badge">MASTER MODE</span></h1>
            <p style="margin:0; opacity:0.8;">Full Administrative Control & Data Override</p>
        </div>
        <button onclick="location.reload()" style="background:var(--gold); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">LOCK CONSOLE</button>
    </div>

    <div style="background: white; padding: 25px; border-radius: 15px; margin-bottom: 30px; border-top: 5px solid var(--gold);">
        <h3><i class="bi bi-pencil-square"></i> Master Data Override</h3>
        <p style="font-size: 0.9rem; color: #666;">As Admin, you can edit <b>ANY</b> student name or score directly here.</p>
        
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background: #f8fafc; text-align: left;">
                    <th style="padding: 12px;">Student Name</th>
                    <th>Class/Arm</th>
                    <th>Annual Avg</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="masterStudentList">
                </tbody>
        </table>
    </div>

    <div id="schoolGrid"></div>
</div>

<script>
    // 1. GATEWAY SECURITY
    function unlockVault() {
        const pin = document.getElementById('masterGate').value;
        if(pin === "0000") { // The Admin Portal PIN
            document.getElementById('adminLock').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            loadMasterData();
            initClassGrid();
        } else {
            alert("Unauthorized Access. System Lockdown Active.");
        }
    }

    // 2. MASTER EDIT LOGIC
    function loadMasterData() {
        const students = JSON.parse(localStorage.getItem('students') || '[]');
        const list = document.getElementById('masterStudentList');
        list.innerHTML = "";

        students.forEach((s, idx) => {
            list.innerHTML += `
                <tr class="edit-row">
                    <td style="padding:10px;"><input type="text" value="${s.name}" onchange="updateName(${idx}, this.value)" style="padding:5px; border:1px solid var(--gold); border-radius:4px; width: 80%;"></td>
                    <td>${s.grade} ${s.arm}</td>
                    <td><b>92.4%</b></td>
                    <td><button onclick="deleteStudent(${idx})" style="color:red; border:none; background:none; cursor:pointer;"><i class="bi bi-trash"></i></button></td>
                </tr>
            `;
        });
    }

    function updateName(index, newName) {
        let students = JSON.parse(localStorage.getItem('students'));
        students[index].name = newName;
        localStorage.setItem('students', JSON.stringify(students));
        alert("Master Record Updated Successfully.");
    }

    // (Include the initClassGrid logic from previous version to show all 24 classes)
</script>
</body>
</html>
