<div class="card" style="margin-top:30px; border: 2px solid var(--gold); background: white; padding: 25px; border-radius: 15px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color: var(--emerald); margin: 0;"><i class="bi bi-person-badge"></i> Staff PIN Distribution</h2>
        <input type="text" id="staffSearch" placeholder="Search Class (e.g. Grade 4)..." onkeyup="filterStaff()" style="padding: 10px; border-radius: 8px; border: 1px solid #ddd; width: 250px;">
    </div>

    <table style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="background: var(--emerald); color: white;">
                <th style="padding: 12px; text-align: left;">Class & Arm</th>
                <th style="padding: 12px; text-align: left;">Teacher Name</th>
                <th style="padding: 12px; text-align: center;">Security PIN</th>
                <th style="padding: 12px; text-align: right;">Action</th>
            </tr>
        </thead>
        <tbody id="staffPinTable">
            </tbody>
    </table>
</div>

<script>
    // Master list of all 24 Class Arms
    const allGradeLevels = ["Grade 1", "Grade 2", "Grade 3", "Grade 4", "Grade 5", "Grade 6"];
    const allArms = ["Blue", "Green", "Red", "White"];

    function loadStaffPins() {
        const tbody = document.getElementById('staffPinTable');
        let rows = "";
        
        allGradeLevels.forEach(g => {
            allArms.forEach(a => {
                // Generate/Retrieve PIN (For demo, we use a consistent pattern)
                const classID = g.replace(" ", "") + a;
                const savedPin = localStorage.getItem(`pin_${classID}`) || Math.floor(1000 + Math.random() * 9000);
                localStorage.setItem(`pin_${classID}`, savedPin); // Save it so it doesn't change on refresh

                rows += `
                    <tr class="staff-row">
                        <td style="padding: 12px; border-bottom: 1px solid #eee;"><b>${g} ${a}</b></td>
                        <td style="padding: 12px; border-bottom: 1px solid #eee;">
                            <input type="text" placeholder="Assign Teacher..." style="border:none; border-bottom:1px solid #ccc; width:150px;">
                        </td>
                        <td style="padding: 12px; border-bottom: 1px solid #eee; text-align: center;">
                            <span style="font-family: monospace; font-weight: bold; background: #fff3cd; padding: 5px 10px; border-radius: 5px; color: #856404;">${savedPin}</span>
                        </td>
                        <td style="padding: 12px; border-bottom: 1px solid #eee; text-align: right;">
                            <button onclick="copyPin('${savedPin}')" style="background: none; border: 1px solid var(--emerald); color: var(--emerald); padding: 5px 10px; border-radius: 5px; cursor: pointer;">
                                <i class="bi bi-clipboard"></i> Copy
                            </button>
                        </td>
                    </tr>
                `;
            });
        });
        tbody.innerHTML = rows;
    }

    function filterStaff() {
        let input = document.getElementById('staffSearch').value.toUpperCase();
        let rows = document.getElementsByClassName('staff-row');
        for (let i = 0; i < rows.length; i++) {
            let text = rows[i].innerText.toUpperCase();
            rows[i].style.display = text.includes(input) ? "" : "none";
        }
    }

    function copyPin(pin) {
        navigator.clipboard.writeText(pin);
        alert("PIN " + pin + " copied! You can now paste this to the teacher.");
    }

    // Call this when the Admin unlocks the vault
    loadStaffPins();
</script>
