<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Decipher Live Room</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src='https://meet.jit.si/external_api.js'></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { 
            background-color: #020617; 
            color: white; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; /* Prevents scrolling */
        }
        /* Responsive Board Container */
        #board-wrapper {
            width: 90vw;
            max-width: 400px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="p-4">

    <div class="flex items-center justify-between mb-4">
        <img src="Screenshot_20260319-202756.jpg" class="w-16 h-16 rounded-full border-2 border-yellow-500 object-cover">
        <div class="text-right">
            <h1 class="text-sm font-black uppercase text-yellow-500">Live Academy</h1>
            <p class="text-[10px] text-slate-400">Audio: <span id="status" class="text-green-500 animate-pulse">Ready</span></p>
        </div>
    </div>

    <div id="board-wrapper">
        <div id="myBoard" class="shadow-2xl border-2 border-slate-700"></div>
    </div>

    <div class="flex gap-2 mt-4 max-w-[400px] mx-auto w-full">
        <button id="startBtn" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold text-xs uppercase tracking-widest">Reset</button>
        <button id="clearBtn" class="flex-1 bg-red-600 py-3 rounded-xl font-bold text-xs uppercase tracking-widest">Clear</button>
    </div>

    <div id="voice-container" class="mt-4 h-32 w-full max-w-[400px] mx-auto rounded-2xl overflow-hidden border border-slate-800"></div>

    <script>
        // FIX 1: Set the piece theme to a Cloud URL so they show up
        var board = Chessboard('myBoard', {
            draggable: true,
            dropOffBoard: 'trash',
            sparePieces: true,
            position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        });

        $('#startBtn').on('click', board.start);
        $('#clearBtn').on('click', board.clear);

        // FIX 2: Mobile Resize
        $(window).resize(board.resize);

        // Jitsi Setup
        window.onload = () => {
            const domain = 'meet.jit.si';
            const options = {
                roomName: 'DecipherRoom_Private_2026',
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#voice-container'),
                configOverwrite: { startWithVideoMuted: true },
                interfaceConfigOverwrite: { TOOLBAR_BUTTONS: ['microphone'] }
            };
            const api = new JitsiMeetExternalAPI(domain, options);
        };
    </script>
</body>
</html>
