<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Session | Decipher Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://meet.jit.si/external_api.js'></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; color: white; display: flex; flex-direction: column; }
        .brand-font { font-family: 'Cinzel', serif; }
        .dashboard-glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-border { border: 2px solid #D4AF37; }
        .control-btn { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.1); }
        .control-btn:hover { background: #D4AF37; color: black; transform: translateY(-2px); }
    </style>
</head>
<body>

    <nav class="h-24 bg-slate-900/50 backdrop-blur-md border-b border-white/10 flex items-center justify-between px-8 shrink-0">
        <div class="flex items-center gap-6">
            <img src="Screenshot_20260319-202756.jpg" class="w-16 h-16 rounded-full gold-border shadow-lg object-cover">
            <div>
                <h1 class="brand-font font-bold text-xl tracking-widest text-white leading-none">DECIPHER</h1>
                <span class="text-[10px] font-black uppercase text-yellow-500 tracking-[0.4em]">Master Instructor View</span>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="muteAll()" class="control-btn bg-red-600/10 text-red-500 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">
                <i class="fas fa-microphone-slash mr-2"></i> Mute All Students
            </button>
            <button onclick="toggleFocus()" class="control-btn bg-blue-600/10 text-blue-400 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest">
                <i class="fas fa-expand mr-2"></i> Focus Mode
            </button>
            <a href="index.html" class="bg-white/5 text-slate-400 hover:bg-red-600 hover:text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition">End Class</a>
        </div>
    </nav>

    <main class="flex-1 flex gap-4 p-4 overflow-hidden">
        <div id="board-container" class="flex-[3] dashboard-glass rounded-[2.5rem] p-2 shadow-2xl overflow-hidden transition-all duration-500">
            <iframe src="https://www.chess.com/analysis" class="w-full h-full rounded-[2rem]" frameborder="0"></iframe>
        </div>

        <aside id="sidebar" class="flex-1 flex flex-col gap-4 min-w-[350px] transition-all duration-500">
            <div class="h-64 dashboard-glass rounded-[2.5rem] border-2 border-yellow-500/20 overflow-hidden" id="jitsi-container"></div>
            
            <div class="flex-1 dashboard-glass rounded-[2.5rem] p-6 flex flex-col">
                <h3 class="text-[11px] font-black uppercase tracking-widest text-yellow-500 mb-4">Instructor Notes</h3>
                <div class="flex-1 text-xs text-slate-400 space-y-3 italic">
                    <p>• Students can hear you now.</p>
                    <p>• Use 'Share Screen' in the video box so they see your moves.</p>
                    <p>• Mute All is active for your control.</p>
                </div>
                <div class="mt-4 p-4 bg-yellow-500/10 rounded-2xl border border-yellow-500/20">
                    <p class="text-[10px] font-black text-yellow-500 uppercase">Pro Tip</p>
                    <p class="text-[11px] text-slate-300 mt-1">Right-click on the board to draw arrows!</p>
                </div>
            </div>
        </aside>
    </main>

    <script>
        let api = null;
        window.onload = () => {
            api = new JitsiMeetExternalAPI('meet.jit.si', {
                roomName: 'Decipher_Elite_Classroom_2026',
                width: '100%', height: '100%',
                parentNode: document.querySelector('#jitsi-container'),
                interfaceConfigOverwrite: { TOOLBAR_BUTTONS: ['microphone', 'camera', 'desktop', 'chat'] }
            });
        };

        function muteAll() {
            api.executeCommand('muteEveryone');
            alert("All students have been muted.");
        }

        function toggleFocus() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
        }
    </script>
</body>
</html>
