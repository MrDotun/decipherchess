<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Room | Decipher Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://meet.jit.si/external_api.js'></script>
    <style>
        body { background: #0f172a; font-family: sans-serif; height: 100vh; display: flex; flex-col; overflow: hidden; }
    </style>
</head>
<body class="flex flex-col">
    <header class="h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-6">
        <div class="flex items-center gap-3">
            <img src="Screenshot_20260319-202756.jpg" class="w-8 h-8 rounded-full">
            <span class="text-white font-black text-xs uppercase tracking-widest">Decipher Live Room</span>
        </div>
        <a href="index.html" class="text-red-500 text-xs font-bold uppercase">Leave Session</a>
    </header>

    <main class="flex-1 flex gap-4 p-4 overflow-hidden">
        <div class="flex-1 bg-white rounded-2xl overflow-hidden shadow-2xl">
            <iframe src="https://www.chess.com/analysis" class="w-full h-full" frameborder="0"></iframe>
        </div>

        <div class="w-80 flex flex-col gap-4">
            <div id="video-feed" class="h-64 bg-slate-950 rounded-2xl border border-slate-800 overflow-hidden"></div>
            <div class="flex-1 bg-slate-900 rounded-2xl border border-slate-800 p-4">
                <p class="text-[10px] font-black text-blue-400 uppercase mb-4">Class Chat</p>
                <div class="text-xs text-slate-500 italic leading-relaxed">
                    Instructor joined.<br>Students joined.<br><br>
                    Welcome to today's lesson. Please turn off microphones.
                </div>
            </div>
        </div>
    </main>

    <script>
        window.onload = () => {
            const options = {
                roomName: 'Decipher_Academy_Global_Room',
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#video-feed'),
                interfaceConfigOverwrite: { TOOLBAR_BUTTONS: ['microphone', 'camera', 'chat'] }
            };
            new JitsiMeetExternalAPI('meet.jit.si', options);
        };
    </script>
</body>
</html>
