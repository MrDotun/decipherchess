
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play against Decipher Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        body, html {
            margin: 0; 
            padding: 0;
            min-height: 100%; 
            width: 100%;
            overflow-y: auto; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
            background-color: #1a1a2e;
        }

        /* RED BUZZ ANIMATION */
        @keyframes buzz-red {
            0% { transform: translateX(0); background-color: transparent; }
            25% { transform: translateX(-5px); background-color: rgba(255, 0, 0, 0.3); }
            50% { transform: translateX(5px); background-color: rgba(255, 0, 0, 0.3); }
            75% { transform: translateX(-5px); background-color: rgba(255, 0, 0, 0.3); }
            100% { transform: translateX(0); background-color: transparent; }
        }
        .illegal-move-buzz {
            animation: buzz-red 0.3s linear;
        }

        #welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
            text-align: center;
        }
        .login-card {
            background: #2D1B4D;
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #4ade80;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
        }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #4ade80;
            background: #1a1a2e;
            color: white;
            box-sizing: border-box;
        }

        #leaderboard-box {
            margin-top: 20px;
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            max-height: 200px; 
            overflow-y: auto;
            border: 1px solid #4ade8044;
            position: relative;
        }
        #leaderboard-box h3 { font-size: 0.9em; margin: 0 0 5px 0; color: #facc15; text-align: center; cursor: pointer; }
        #leaderboardList { list-style: none; padding: 0; margin: 0; font-size: 0.85em; color: #4ade80; }
        #leaderboardList li { border-bottom: 1px solid #ffffff11; padding: 3px 0; }

        .admin-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        .refresh-btn {
            background: none;
            border: 1px solid #4ade80;
            color: #4ade80;
            border-radius: 4px;
            font-size: 0.7em;
            cursor: pointer;
            padding: 2px 8px;
        }
        .refresh-btn:hover { background: #4ade8022; }

        #game-container {
            display: none; 
            width: 95vmin; 
            max-width: 550px;
            text-align: center;
            padding: 20px 10px;
        }

        #board { 
            width: 100%; 
            margin-bottom: 15px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .info-panel {
            background: #2D1B4D; 
            padding: 20px;
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid #4ade80;
            color: white;
        }
        h2 { margin: 0 0 10px 0; color: #4ade80; font-size: 1.4em; }
        .grade { font-size: 1.3em; font-weight: bold; color: #4ade80; }
        
        .submit-btn {
            background-color: #4ade80;
            color: #1a1a2e;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(74, 222, 128, 0.2);
        }
        .submit-btn:hover {
            background-color: #22c55e;
            transform: translateY(-2px);
        }

        .highlight-white { background-color: #f6f669 !important; }
        .highlight-black { background-color: #e6e600 !important; }
        .white-1e1d7 { background-color: #ebecd0 !important; }
        .black-3c85d { background-color: #779556 !important; }
        
        #remark { 
            font-style: italic; 
            color: #facc15; 
            min-height: 1.5em; 
            display: block; 
            margin: 10px 0; 
            font-weight: 500;
        }
        #status { font-weight: bold; color: #cbd5e1; }
    </style>
</head>
<body>

<div id="welcome-overlay">
    <div class="login-card">
        <h1 style="color: #4ade80;">Week One Task</h1>
        <p>Welcome, Chess Champion! Please enter your details to start the match.</p>
        <input type="text" id="studentName" placeholder="Enter Your Full Name" required>
        <input type="text" id="studentClass" placeholder="Enter Your Class" required>
        <button class="submit-btn" onclick="startGame()">START GAME</button>

        <div id="leaderboard-box">
            <h3 ondblclick="adminResetLeaderboard()">🏆 Hall of Grandmasters</h3>
            <div class="admin-controls">
                <button class="refresh-btn" onclick="manualRefresh()">↻ Refresh</button>
            </div>
            <ul id="leaderboardList"><li>Loading...</li></ul>
        </div>
    </div>
</div>

<div id="game-container">
    <div class="info-panel">
        <h2 id="welcome-msg">Playing against: <strong>Decipher Chess</strong></h2>
        <div id="board"></div>
        <p id="remark">"If you don't win, I'll be disappointed"</p>
        <p>Your Grade: <span id="grade" class="grade">Beginner</span></p>
        <p id="status">Your turn! Click a piece to select it.</p>
        
        <hr style="border: 0; border-top: 1px solid #4ade80; margin: 20px 0; opacity: 0.3;">
        
        <button class="submit-btn" onclick="sendResultsToEmail()">SUBMIT TO DECIPHER CHESS</button>
    </div>
</div>

<script>
    // --- FIREBASE INTEGRATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyCcSVTifrJhzXvhQ4m1UyObtCKd8QnKEUw",
      authDomain: "assignments-de95a.firebaseapp.com",
      projectId: "assignments-de95a",
      storageBucket: "assignments-de95a.firebasestorage.app",
      messagingSenderId: "1088073398299",
      appId: "1:1088073398299:web:dab1f57ac1d63b10dba0be"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    var currentName = "";
    var currentClass = "";
    var hasSavedWin = false;

    // --- NEW EMAIL SUBMISSION FUNCTION ---
    function sendResultsToEmail() {
        const student = currentName || "Unknown Player";
        const room = currentClass || "Unknown Class";
        const gradeLevel = document.getElementById('grade').innerText;
        const totalPoints = totalScore;
        
        const subject = encodeURIComponent(`Decipher Chess Results: ${student}`);
        const emailBody = encodeURIComponent(
            `Player Details:\n` +
            `------------------\n` +
            `Name: ${student}\n` +
            `Class: ${room}\n` +
            `Final Grade: ${gradeLevel}\n` +
            `Capture Points: ${totalPoints}\n\n` +
            `Game Notation: ${game.history().join(' ')}`
        );

        window.location.href = `mailto:dennisdaramola@proton.me?subject=${subject}&body=${emailBody}`;
    }

    function subscribeToLeaderboard() {
        return db.collection("grandmasters").orderBy("timestamp", "desc").limit(100)
          .onSnapshot((snapshot) => {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = "";
            if (snapshot.empty) list.innerHTML = "<li>No Grandmasters yet. Win to be first!</li>";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const li = document.createElement('li');
                li.textContent = `👑 ${data.name} (${data.class})`;
                list.prepend(li);
            });
        });
    }

    let unsubscribe = subscribeToLeaderboard();

    function manualRefresh() {
        unsubscribe();
        document.getElementById('leaderboardList').innerHTML = "<li>Refreshing...</li>";
        unsubscribe = subscribeToLeaderboard();
    }

    function adminResetLeaderboard() {
        const pass = prompt("Enter Admin Password to Clear Leaderboard:");
        if (pass === "dotun123") {
            if (confirm("Are you sure you want to wipe the leaderboard?")) {
                db.collection("grandmasters").get().then((snapshot) => {
                    snapshot.forEach((doc) => {
                        db.collection("grandmasters").doc(doc.id).delete();
                    });
                    alert("Leaderboard Cleared.");
                });
            }
        } else {
            alert("Incorrect password.");
        }
    }

    function startGame() {
        currentName = document.getElementById('studentName').value;
        currentClass = document.getElementById('studentClass').value;
        if (currentName.trim() === "" || currentClass.trim() === "") {
            alert("Please enter both your name and class.");
            return;
        }
        document.getElementById('welcome-overlay').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        board.resize();
    }

    // --- OPTIMIZED CHESS ENGINE LOGIC ---
    var board = null;
    var game = new Chess();
    var $status = $('#status');
    var $grade = $('#grade');
    var $remark = $('#remark');
    var sourceSquare = null; 

    const weights = { p: 100, n: 320, b: 330, r: 500, q: 900, k: 20000 };
    var totalScore = 0;

    function evaluateBoard(game) {
        let totalEvaluation = 0;
        const b = game.board();
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                let piece = b[i][j];
                if (piece) {
                    let val = weights[piece.type];
                    totalEvaluation += (piece.color === 'w' ? -val : val);
                }
            }
        }
        return totalEvaluation;
    }

    function minimax(game, depth, alpha, beta, isMaximizing) {
        if (depth === 0 || game.game_over()) return evaluateBoard(game);

        let moves = game.moves();
        if (isMaximizing) {
            let bestScore = -Infinity;
            for (let move of moves) {
                game.move(move);
                bestScore = Math.max(bestScore, minimax(game, depth - 1, alpha, beta, false));
                game.undo();
                alpha = Math.max(alpha, bestScore);
                if (beta <= alpha) break;
            }
            return bestScore;
        } else {
            let bestScore = Infinity;
            for (let move of moves) {
                game.move(move);
                bestScore = Math.min(bestScore, minimax(game, depth - 1, alpha, beta, true));
                game.undo();
                beta = Math.min(beta, bestScore);
                if (beta <= alpha) break;
            }
            return bestScore;
        }
    }

    function makeAIMove() {
        if (game.game_over()) return;

        let moves = game.moves();
        if (moves.length === 0) return;

        moves.sort(() => Math.random() - 0.5);

        let bestMove = moves[0];
        let bestValue = -Infinity;

        for (let move of moves) {
            game.move(move);
            let boardValue = minimax(game, 1, -100000, 100000, false);
            game.undo();
            if (boardValue > bestValue) {
                bestValue = boardValue;
                bestMove = move;
            }
        }

        game.move(bestMove);
        board.position(game.fen());
        updateStatus();
    }

    function updateStatus() {
        var history = game.history();
        var histText = "<br><small>History: " + history.slice(-6).join(' ') + "</small>";

        if (game.in_checkmate()) {
            $status.html("Game Over! Decipher Chess wins." + histText);
            $remark.text("Checkmate! Better luck next time.");
        } else if (game.in_draw()) {
            $status.html("Game Over! It's a draw." + histText);
        } else {
            $status.html("Decipher Chess moved. Your turn!" + histText);
        }
    }

    function updateGrade() {
        if (totalScore >= 200) {
            $grade.text("Grandmaster! 👑");
            if (!hasSavedWin && currentName) {
                db.collection("grandmasters").add({
                    name: currentName,
                    class: currentClass,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                hasSavedWin = true;
            }
        }
        else if (totalScore >= 120) $grade.text("Expert 🏆");
        else if (totalScore >= 70) $grade.text("Pro 🌟");
        else if (totalScore >= 30) $grade.text("Advanced 👍");
        else $grade.text("Beginner");
    }

    function onSquareClick(square) {
        if (game.game_over()) return;
        if (sourceSquare === null) {
            var piece = game.get(square);
            if (piece && piece.color === 'w') {
                sourceSquare = square;
                removeHighlights();
                addHighlight(square);
            }
            return;
        }
        var move = game.move({ from: sourceSquare, to: square, promotion: 'q' });
        if (move === null) {
            var piece = game.get(square);
            if (piece && piece.color === 'w') {
                sourceSquare = square;
                removeHighlights();
                addHighlight(square);
            } else {
                var $board = $('#board');
                $board.addClass('illegal-move-buzz');
                setTimeout(function() { $board.removeClass('illegal-move-buzz'); }, 300);
                
                sourceSquare = null;
                removeHighlights();
            }
            return;
        }
        board.position(game.fen());
        sourceSquare = null;
        removeHighlights();
        
        if (move.captured) {
            const pValues = { 'p': 10, 'n': 30, 'b': 30, 'r': 50, 'q': 90, 'k': 0 };
            totalScore += pValues[move.captured];
        }

        updateGrade();
        $status.html("Thinking...");
        window.setTimeout(makeAIMove, 250);
    }

    function addHighlight(square) {
        var $el = $('#board .square-' + square);
        if ($el.hasClass('black-3c85d')) $el.addClass('highlight-black');
        else $el.addClass('highlight-white');
    }

    function removeHighlights() {
        $('#board [class*="square-"]').removeClass('highlight-white highlight-black');
    }

    var config = {
        draggable: false,
        position: 'start',
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    };
    board = ChessBoard('board', config);
    $('#board').on('click', '[class*="square-"]', function() {
        onSquareClick($(this).attr('data-square'));
    });
    $(window).resize(board.resize);
</script>
</body>
</html>
