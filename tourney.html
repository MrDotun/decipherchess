<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Masters | Mind Masters Academy</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        :root {
            --light-sq: #ebecd0; --dark-sq: #779556;
            --highlight-select: rgba(255, 255, 0, 0.5); --highlight-last: rgba(255, 255, 0, 0.3);
            --bg-color: #1a1a2e; 
            --panel-bg: #2D1B4D;
            --accent: #4ade80;
            --card-bg: #3B2667;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: white;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        #app-container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; background: var(--panel-bg); border: 2px solid var(--accent); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .header-title { text-align: center; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; font-size: 20px; }
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active-screen { display: flex; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: var(--card-bg); border-radius: 10px; overflow: hidden; }
        th, td { padding: 10px; border-bottom: 1px solid #5b3fa1; text-align: left; font-size: 14px; }
        th { background: rgba(74, 222, 128, 0.1); color: var(--accent); }
        button { background-color: var(--accent); color: #1a1a2e; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px 0; width: 100%; transition: 0.3s; }
        button:hover { background-color: #22c55e; transform: translateY(-2px); }
        .timer { background: #1a1a2e; padding: 8px 15px; border-radius: 8px; font-family: monospace; font-size: 20px; color: #ffca28; border: 1px solid #444; }
        .player-info { display: flex; justify-content: space-between; width: 100%; align-items: center; margin: 10px 0; }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); width: 100%; aspect-ratio: 1/1; border: 4px solid #111; border-radius: 5px; overflow: hidden; }
        .square { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        .light { background-color: var(--light-sq); } .dark { background-color: var(--dark-sq); }
        .selected::after { content: ''; position: absolute; inset: 0; background: var(--highlight-select); }
        .last-move::after { content: ''; position: absolute; inset: 0; background: var(--highlight-last); }
        .square img { width: 90%; z-index: 2; }
        #history-log { width: 100%; height: 50px; background: #1a1a2e; margin: 10px 0; padding: 8px; font-size: 13px; overflow-y: auto; color: #b794f4; border-radius: 8px; border: 1px solid #5b3fa1; }
        .save-box { background: var(--card-bg); padding: 15px; border-radius: 12px; width: 100%; box-sizing: border-box; margin-top: 10px; }
        input { background: #1a1a2e; border: 1px solid #5b3fa1; color: white; padding: 10px; width: 90%; border-radius: 5px; margin-bottom: 10px; }
        #thinking-indicator { color: var(--accent); font-style: italic; font-size: 14px; visibility: hidden; }
        .back-dash { display: block; text-align: center; color: var(--accent); text-decoration: none; font-size: 14px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header-title">Nigerian Masters Blitz</div>

    <div id="intro-screen" class="screen active-screen">
        <div style="overflow-y:auto; flex-grow:1; width:100%; max-height: 250px;">
            <table id="intro-table"><thead><tr><th>Rank</th><th>Master</th><th>Rating</th></tr></thead><tbody id="intro-tbody"></tbody></table>
        </div>
        <div class="save-box">
            <input type="text" id="kid-name" placeholder="Enter Your Name..."/>
            <input type="text" id="save-code-input" placeholder="Secret Code (to save game)"/>
            <div style="display:flex; gap:10px;">
                <button onclick="enrollKid()">Start Tournament</button>
                <button onclick="resumeTournament()" style="background:#3B2667; color: white; border: 1px solid var(--accent);">Resume</button>
            </div>
        </div>
        <a href="index.html" class="back-dash">← Back to Dashboard</a>
    </div>

    <div id="game-screen" class="screen">
        <div class="player-info">
            <div style="font-weight: bold;"><span id="opp-name">Opponent</span><span id="thinking-indicator">...</span></div>
            <div id="timer-opp" class="timer">05:00</div>
        </div>
        
        <div id="board-container" style="position:relative; width:100%;">
            <div id="board"></div>
        </div>

        <div class="player-info">
            <div style="font-weight: bold;" id="user-name">You</div>
            <div id="timer-user" class="timer">05:00</div>
        </div>

        <div id="history-log"></div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px; width:100%;">
            <button onclick="resignGame()" style="background:#e64a19; color: white;">Resign</button>
            <button onclick="exitToMenu()" style="background:#555; color: white;">Save & Exit</button>
        </div>
        <button id="end-game-btn" style="display:none;" onclick="showRankings()">View Standings</button>
    </div>

    <div id="rankings-screen" class="screen">
        <h3 style="color: var(--accent);">Current Standings</h3>
        <table style="width:100%;"><thead><tr><th>Pos</th><th>Player</th><th>Pts</th></tr></thead><tbody id="ranking-tbody"></tbody></table>
        <button onclick="startNextRound()">Start Next Round</button>
    </div>
</div>

<script>
    const mastersData = [
        { name: "IM Odion Aikhoje", rating: 2351, pts: 0 }, { name: "FM Adebayo Adegboyega", rating: 2312, pts: 0 },
        { name: "FM Bomo Kigigha", rating: 2334, pts: 0 }, { name: "IM Adu Oladapo", rating: 2321, pts: 0 },
        { name: "IM Bunmi Olape", rating: 2306, pts: 0 }, { name: "FM Akinseye Abiola", rating: 2252, pts: 0 },
        { name: "IM Oluwafemi Balogun", rating: 2291, pts: 0 }, { name: "IM Anwuli Daniel", rating: 2365, pts: 0 }
    ];

    let players = [], kidPlayer = { name: "", rating: 2000, pts: 0, isKid: true }, currentRound = 1;
    let game, userColor, currentOpponent, intervalId, timerW = 300, timerB = 300, selectedSquare = null, lastMove = null;

    const pieces = {
        p: 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg', n: 'https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg',
        b: 'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg', r: 'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg',
        q: 'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg', k: 'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg',
        P: 'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg', N: 'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg',
        B: 'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg', R: 'https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg',
        Q: 'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg', K: 'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg'
    };

    // --- AI ENGINE CORE ---
    const PIECE_VALUES = { p: 100, n: 320, b: 330, r: 500, q: 950, k: 20000 };
    
    // Position weights: Encourages center control and King safety
    const WEIGHTS = {
        p: [ [0,0,0,0,0,0,0,0],[5,5,5,5,5,5,5,5],[1,1,2,3,3,2,1,1],[0.5,0.5,1,2.5,2.5,1,0.5,0.5],[0,0,0,2,2,0,0,0],[0.5,-0.5,-1,0,0,-1,-0.5,0.5],[0.5,1,1,-2,-2,1,1,0.5],[0,0,0,0,0,0,0,0] ],
        n: [ [-5,-4,-3,-3,-3,-3,-4,-5],[-4,-2,0,0,0,0,-2,-4],[-3,0,1,1.5,1.5,1,0,-3],[-3,0.5,1.5,2,2,1.5,0.5,-3],[-3,0,1.5,2,2,1.5,0,-3],[-3,0.5,1,1.5,1.5,1,0.5,-3],[-4,-2,0,0.5,0.5,0,-2,-4],[-5,-4,-3,-3,-3,-3,-4,-5] ],
        k: [ [-3,-4,-4,-5,-5,-4,-4,-3],[-3,-4,-4,-5,-5,-4,-4,-3],[-3,-4,-4,-5,-5,-4,-4,-3],[-3,-4,-4,-5,-5,-4,-4,-3],[-2,-3,-3,-4,-4,-3,-3,-2],[-1,-2,-2,-2,-2,-2,-2,-1],[2,2,0,0,0,0,2,2],[2,3,1,0,0,1,3,2] ]
    };

    function evaluateBoard(g) {
        let total = 0;
        const board = g.board();
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const p = board[r][c];
                if (p) {
                    let val = PIECE_VALUES[p.type];
                    if (WEIGHTS[p.type]) val += (p.color === 'w' ? WEIGHTS[p.type][r][c] : WEIGHTS[p.type][7-r][c]);
                    total += (p.color === 'w' ? val : -val);
                }
            }
        }
        return total;
    }

    function minimax(g, depth, alpha, beta, isMax) {
        if (depth === 0 || g.game_over()) return evaluateBoard(g);
        const moves = g.moves();
        moves.sort((a, b) => b.includes('x') ? 1 : -1); // Move ordering for speed

        if (isMax) {
            let maxEval = -Infinity;
            for (const m of moves) {
                g.move(m);
                let ev = minimax(g, depth - 1, alpha, beta, false);
                g.undo();
                maxEval = Math.max(maxEval, ev);
                alpha = Math.max(alpha, ev);
                if (beta <= alpha) break;
            }
            return maxEval;
        } else {
            let minEval = Infinity;
            for (const m of moves) {
                g.move(m);
                let ev = minimax(g, depth - 1, alpha, beta, true);
                g.undo();
                minEval = Math.min(minEval, ev);
                beta = Math.min(beta, ev);
                if (beta <= alpha) break;
            }
            return minEval;
        }
    }

    function makeAIMove() {
        document.getElementById('thinking-indicator').style.visibility = 'visible';
        setTimeout(() => {
            const moves = game.moves();
            if (moves.length === 0) return;
            
            let bestMove = null;
            let bestValue = (game.turn() === 'w' ? -Infinity : Infinity);

            for (const m of moves) {
                game.move(m);
                let val = minimax(game, 2, -Infinity, Infinity, game.turn() === 'w');
                game.undo();

                if (game.turn() === 'w' && val > bestValue) { bestValue = val; bestMove = m; }
                else if (game.turn() === 'b' && val < bestValue) { bestValue = val; bestMove = m; }
            }

            lastMove = game.move(bestMove || moves[0]);
            document.getElementById('thinking-indicator').style.visibility = 'hidden';
            drawBoard();
            if (game.game_over()) checkEnd();
        }, 300);
    }
    // --- END AI ENGINE ---

    window.onload = () => {
        const tb = document.getElementById("intro-tbody");
        mastersData.forEach((p, i) => tb.innerHTML += `<tr><td>${i+1}</td><td>${p.name}</td><td>${p.rating}</td></tr>`);
    };

    function enrollKid() { 
        kidPlayer.name = document.getElementById("kid-name").value || "Player"; 
        players = [...mastersData, kidPlayer]; 
        startNextRound(); 
    }

    function startNextRound() {
        if (currentRound > 7) return alert("Tournament Over");
        userColor = Math.random() < 0.5 ? 'w' : 'b';
        currentOpponent = mastersData[Math.floor(Math.random()*mastersData.length)];
        game = new Chess(); timerW = timerB = 300;
        document.getElementById("opp-name").innerText = currentOpponent.name;
        document.getElementById("user-name").innerText = kidPlayer.name;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById('game-screen').classList.add('active-screen');
        drawBoard(); startTimer();
        if (game.turn() !== userColor) makeAIMove();
    }

    function drawBoard() {
        const b = document.getElementById("board"); b.innerHTML = "";
        const boardState = game.board();
        for (let i = 0; i < 64; i++) {
            let r = Math.floor(i / 8), c = i % 8;
            if (userColor === 'b') { r = 7 - r; c = 7 - c; }
            const sq = String.fromCharCode(97+c) + (8-r);
            const el = document.createElement("div");
            el.className = `square ${(r+c)%2===0?'light':'dark'}`;
            if (selectedSquare === sq) el.classList.add("selected");
            if (lastMove && (lastMove.from === sq || lastMove.to === sq)) el.classList.add("last-move");
            const p = boardState[r][c];
            if (p) { const img = document.createElement("img"); img.src = pieces[p.color==='w'?p.type.toUpperCase():p.type]; el.appendChild(img); }
            el.onclick = () => handleSquareClick(sq);
            b.appendChild(el);
        }
        updateHistory();
    }

    function handleSquareClick(sq) {
        if (game.turn() !== userColor) return;
        if (selectedSquare === sq) selectedSquare = null;
        else if (selectedSquare) {
            const move = game.move({ from: selectedSquare, to: sq, promotion: 'q' });
            if (move) { selectedSquare = null; lastMove = move; drawBoard(); if (!game.game_over()) makeAIMove(); else checkEnd(); }
            else selectedSquare = sq;
        } else selectedSquare = sq;
        drawBoard();
    }

    function startTimer() {
        clearInterval(intervalId);
        intervalId = setInterval(() => {
            if (game.turn() === 'w') timerW--; else timerB--;
            const curW = `${Math.floor(timerW/60)}:${(timerW%60).toString().padStart(2,'0')}`;
            const curB = `${Math.floor(timerB/60)}:${(timerB%60).toString().padStart(2,'0')}`;
            document.getElementById("timer-user").innerText = userColor==='w'?curW:curB;
            document.getElementById("timer-opp").innerText = userColor==='w'?curB:curW;
            if (timerW<=0 || timerB<=0) checkEnd();
        }, 1000);
    }

    function updateHistory() {
        const logEl = document.getElementById("history-log");
        logEl.innerText = game.history().join(" ") || "Game started...";
    }

    function checkEnd() {
        clearInterval(intervalId);
        document.getElementById("end-game-btn").style.display = "block";
    }

    function showRankings() {
        currentRound++;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById('rankings-screen').classList.add('active-screen');
    }

    function exitToMenu() { location.reload(); }
    function resignGame() { checkEnd(); }
</script>

</body>
</html>
