
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Entry | MCPS</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .pin-box { max-width: 350px; margin: 100px auto; padding: 30px; border: 1px solid #ddd; border-radius: 10px; }
        .scoring { display: none; text-align: left; max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div id="auth" class="pin-box">
        <h3>Subject Teacher Security</h3>
        <p>Enter 4-Digit PIN to score subjects</p>
        <input type="password" id="p" maxlength="4" style="font-size: 2rem; width: 100px; text-align: center;"><br><br>
        <button onclick="check()">Open Score Sheet</button>
    </div>

    <div id="sheet" class="scoring">
        <h2>Maryland Convent: Subject Scoring</h2>
        <select id="term"><option>1st Term</option><option>2nd Term</option><option>3rd Term</option></select>
        <table>
            <thead><tr><th>Student</th><th>Subject</th><th>Test</th><th>Exam</th></tr></thead>
            <tbody>
                <tr><td>Abiola Faith</td><td>Mathematics</td><td><input type="number" style="width:40px"></td><td><input type="number" style="width:40px"></td></tr>
            </tbody>
        </table>
        <button style="margin-top:20px; background: #004d40; color: white; padding: 10px 20px; border: none; border-radius: 5px;">Upload Term Results</button>
    </div>

    <script>
        function check() {
            if(document.getElementById('p').value === "1234") {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('sheet').style.display = 'block';
            } else { alert("Access Denied"); }
        }
    </script>
</body>
</html>
