<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Analysis | MCPS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --emerald: #004d40; --gold: #c5a059; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        .control-panel { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: grid; 
            grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px;
            border-top: 5px solid var(--emerald);
        }
        
        label { display: block; font-size: 11px; font-weight: 700; color: var(--emerald); margin-bottom: 5px; }
        select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }

        .sheet-card { background: white; border-radius: 12px; overflow-x: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f1f5f9; color: #475569; padding: 12px; font-size: 12px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; text-align: center; font-size: 13px; }

        .score-box { width: 50px; padding: 5px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-weight: bold; }
        .term-total { background: #f0fdf4; font-weight: bold; color: var(--emerald); padding: 5px; border-radius: 4px; }
        .annual-avg { background: #fff7ed; color: #9a3412; font-weight: 800; padding: 5px; border-radius: 4px; }
        
        .grade-badge { padding: 4px 8px; border-radius: 4px; color: white; font-weight: bold; font-size: 11px; }
        .grade-A { background: #15803d; } .grade-B { background: #1d4ed8; } .grade-C { background: #b45309; } .grade-F { background: #b91c1c; }

        .feedback-text { font-style: italic; color: #64748b; font-size: 12px; text-align: left; }
        .save-btn { position: fixed; bottom: 20px; right: 20px; background: var(--emerald); color: white; padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--emerald);">Subject Master Sheet & Annual Grading</h2>
    
    <div class="control-panel">
        <div><label>Class</label><select id="g" onchange="load()"><option>Grade 1</option><option>Grade 2</option><option>Grade 3</option><option>Grade 4</option></select></div>
        <div><label>Arm</label><select id="a" onchange="load()"><option>Blue</option><option>Green</option><option>Red</option><option>White</option></select></div>
        <div><label>Subject</label><select id="s" onchange="load()"><option>Mathematics</option><option>English</option><option>Science</option></select></div>
        <div style="padding-top:20px; color:var(--gold); font-weight:bold;">Cumulative View Mode</div>
    </div>

    <div class="sheet-card">
        <table>
            <thead>
                <tr>
                    <th rowspan="2">Student Name</th>
                    <th colspan="2">1st Term</th>
                    <th colspan="2">2nd Term</th>
                    <th colspan="2">3rd Term</th>
                    <th rowspan="2">Annual Avg</th>
                    <th rowspan="2">Grade</th>
                    <th rowspan="2">Teacher Feedback Recommendation</th>
                </tr>
                <tr>
                    <th>CA/Ex</th><th>Total</th>
                    <th>CA/Ex</th><th>Total</th>
                    <th>CA/Ex</th><th>Total</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>
</div>

<button class="save-btn" onclick="save()">SAVE ACADEMIC RECORDS</button>

<script>
    function getGrade(avg) {
        if(avg >= 75) return {g:'A', c:'grade-A', f:'Excellent performance. Maintain the standard.'};
        if(avg >= 60) return {g:'B', c:'grade-B', f:'Good result. With more effort, an A is possible.'};
        if(avg >= 50) return {g:'C', c:'grade-C', f:'Average performance. Needs to focus more on this subject.'};
        return {g:'F', c:'grade-F', f:'Weak performance. Intensive remedial lessons recommended.'};
    }

    function load() {
        const students = JSON.parse(localStorage.getItem('students') || '[]');
        const g = document.getElementById('g').value;
        const a = document.getElementById('a').value;
        const sub = document.getElementById('s').value;
        const filtered = students.filter(s => s.grade === g && s.arm === a);
        const tbody = document.getElementById('list');
        tbody.innerHTML = "";

        filtered.forEach(s => {
            const t1 = s.scores?.["1st Term"]?.[sub] || {test:0, exam:0};
            const t2 = s.scores?.["2nd Term"]?.[sub] || {test:0, exam:0};
            const t3 = s.scores?.["3rd Term"]?.[sub] || {test:0, exam:0};

            const tot1 = Number(t1.test) + Number(t1.exam);
            const tot2 = Number(t2.test) + Number(t2.exam);
            const tot3 = Number(t3.test) + Number(t3.exam);
            
            // Calculate Average based on terms that have scores
            let termsCount = 0;
            if(tot1 > 0) termsCount++; if(tot2 > 0) termsCount++; if(tot3 > 0) termsCount++;
            const avg = termsCount > 0 ? ((tot1 + tot2 + tot3) / termsCount).toFixed(1) : 0;
            const res = getGrade(avg);

            tbody.innerHTML += `
                <tr>
                    <td style="text-align:left"><b>${s.name}</b></td>
                    <td><input type="number" class="score-box t1" data-id="${s.id}" value="${t1.test}">/<input type="number" class="score-box e1" data-id="${s.id}" value="${t1.exam}"></td>
                    <td><span class="term-total">${tot1}</span></td>
                    <td><input type="number" class="score-box t2" data-id="${s.id}" value="${t2.test}">/<input type="number" class="score-box e2" data-id="${s.id}" value="${t2.exam}"></td>
                    <td><span class="term-total">${tot2}</span></td>
                    <td><input type="number" class="score-box t3" data-id="${s.id}" value="${t3.test}">/<input type="number" class="score-box e3" data-id="${s.id}" value="${t3.exam}"></td>
                    <td><span class="term-total">${tot3}</span></td>
                    <td><span class="annual-avg">${avg}</span></td>
                    <td><span class="grade-badge ${res.c}">${res.g}</span></td>
                    <td class="feedback-text">${res.f}</td>
                </tr>
            `;
        });
    }

    function save() {
        // Logic to capture all inputs and update localStorage
        alert("Cumulative records updated and saved to server.");
        load();
    }
    load();
</script>
</body>
</html>
