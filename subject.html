<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Entry Auth | MCPS</title>
    <style>
        body { font-family: sans-serif; background: #333; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 320px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #333; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; }
        #content { display: none; background: white; padding: 30px; width: 90%; max-width: 600px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="login-card" id="lock">
        <h2>Subject Entry</h2>
        <input type="password" id="pin" placeholder="Enter Teacher PIN">
        <button onclick="auth()">UNLOCK SCORES</button>
    </div>

    <div id="content">
        <h3>Mathematics | 3rd Term</h3>
        <table>
            <tr><td>Bello Amina</td><td><input type="number" placeholder="CA"></td><td><input type="number" placeholder="Exam"></td></tr>
        </table>
        <button style="margin-top:20px;">Upload to Master Sheet</button>
    </div>

    <script>
        function auth() {
            if(document.getElementById('pin').value === "2222") {
                document.getElementById('lock').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } else { alert("Access Denied"); }
        }
    </script>
</body>
</html>
