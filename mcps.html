<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway | Maryland Convent Private School</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --emerald: #004d40; --gold: #c5a059; --bg: #fdfbf7; }
        body { font-family: 'Playfair Display', serif; background: var(--bg); margin: 0; text-align: center; }
        .hero { background: var(--emerald); color: white; padding: 50px 20px; border-bottom: 8px solid var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; padding: 40px; max-width: 1100px; margin: auto; }
        .portal-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); cursor: pointer; text-decoration: none; color: inherit; border: 1px solid transparent; transition: 0.3s; }
        .portal-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .portal-card i { font-size: 2.5rem; color: var(--emerald); }
        h2 { margin: 15px 0 5px; color: var(--emerald); font-size: 1.1rem; }
        p { font-family: 'Inter', sans-serif; font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>
    <div class="hero">
        <h1 style="margin: 0;">MARYLAND CONVENT</h1>
        <h2 style="color: var(--gold); margin: 0;">PRIVATE SCHOOL</h2>
        <p style="color: white; opacity: 0.7; font-family: sans-serif; margin-top: 10px;">SECURE DIGITAL PORTAL SYSTEM</p>
    </div>
    <div class="grid">
        <a href="admin.html" class="portal-card"><i class="bi bi-shield-lock-fill"></i><h2>Admin</h2><p>Proprietress Access</p></a>
        <a href="class.html" class="portal-card"><i class="bi bi-people-fill"></i><h2>Class Teachers</h2><p>Registry & Arms</p></a>
        <a href="subject.html" class="portal-card"><i class="bi bi-pen-fill"></i><h2>Subject Teachers</h2><p>Score Entry</p></a>
        <a href="parents.html" class="portal-card"><i class="bi bi-house-heart-fill"></i><h2>Parents</h2><p>Check Results</p></a>
    </div>
</body>
</html>
