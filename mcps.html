<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCPS Portal | Maryland Convent Private School</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --emerald: #004d40; --gold: #c5a059; --bg: #fdfbf7; }
        body { font-family: 'Playfair Display', serif; background: var(--bg); margin: 0; text-align: center; }
        .hero { background: var(--emerald); color: white; padding: 60px 20px; border-bottom: 8px solid var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; max-width: 1200px; margin: auto; }
        .portal-card { background: white; padding: 40px 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); cursor: pointer; text-decoration: none; color: inherit; border: 1px solid transparent; }
        .portal-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .portal-card i { font-size: 3rem; color: var(--emerald); margin-bottom: 15px; }
        h2 { margin: 10px 0; color: var(--emerald); font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="hero">
        <h1 style="font-size: 2.5rem; margin: 0;">MARYLAND CONVENT</h1>
        <h2 style="color: var(--gold); margin: 5px 0;">PRIVATE SCHOOL</h2>
        <p style="font-family: 'Inter', sans-serif; opacity: 0.8;">Integrated School Management System</p>
    </div>

    <div class="grid">
        <a href="admin.html" class="portal-card">
            <i class="bi bi-shield-lock"></i>
            <h2>Proprietress Portal</h2>
            <p>Admin & Finance</p>
        </a>
        <a href="class.html" class="portal-card">
            <i class="bi bi-person-video3"></i>
            <h2>Class Teachers</h2>
            <p>Registry & Enrollment</p>
        </a>
        <a href="subject.html" class="portal-card">
            <i class="bi bi-journal-check"></i>
            <h2>Subject Teachers</h2>
            <p>Scoring & Assessment</p>
        </a>
        <a href="parents.html" class="portal-card">
            <i class="bi bi-house-heart"></i>
            <h2>Parent Portal</h2>
            <p>Student Report Cards</p>
        </a>
    </div>
</body>
</html>
