<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Hero Workbook</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { --primary: #2D1B4D; --secondary: #4ade80; --bg: #1a1a2e; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        #board-container { width: 350px; max-width: 95vw; margin: 10px auto; border: 3px solid var(--secondary); border-radius: 8px; overflow: hidden; }
        .hidden { display: none !important; }
        .btn { padding: 12px 20px; margin: 5px; cursor: pointer; border-radius: 8px; border: 1px solid var(--secondary); background: var(--primary); color: var(--secondary); font-weight: bold; width: 100%; transition: 0.2s; box-sizing: border-box; outline: none; }
        .btn:hover { background: var(--secondary); color: var(--bg); }
        .btn-teacher { border-color: #fbbf24; color: #fbbf24; margin-top: 20px; font-size: 0.9em; }
        
        .summary-table { width: 100%; border-collapse: collapse; margin: 15px 0; background: #24243e; border-radius: 8px; overflow: hidden; font-size: 0.9em; }
        .summary-table th, .summary-table td { padding: 12px; text-align: left; border-bottom: 1px solid #4ade8044; }
        .summary-table th { background: var(--secondary); color: var(--bg); }
        .status-correct { color: var(--secondary); font-weight: bold; }
        .status-incorrect { color: var(--danger); font-weight: bold; }

        #task-text { background: #2D1B4D; padding: 15px; border-radius: 8px; border-left: 5px solid var(--secondary); margin-bottom: 10px; width: 350px; max-width: 90vw; text-align: center; font-weight: bold; box-sizing: border-box; }
        .highlight-selected { background-color: rgba(250, 204, 21, 0.7) !important; }
        .section-label { color: var(--secondary); text-align: center; margin-top: 20px; font-weight: bold; font-size: 1.2em; border-top: 1px solid #ffffff22; padding-top: 10px; }
        .week-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 20px; width: 100%; max-width: 400px; }
        
        #results-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2D1B4D; padding: 20px; border-radius: 12px; border: 2px solid var(--secondary); z-index: 2000; width: 85%; max-height: 80vh; overflow-y: auto; box-shadow: 0 0 30px rgba(0,0,0,1); }
        .leaderboard-entry { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #4ade8044; align-items: center; }
        .name-tag { font-weight: bold; text-transform: capitalize; color: #fff; flex: 1; }
        .score-tag { color: var(--secondary); font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="color: var(--secondary); margin-bottom: 10px;">♟️ Chess Hero</h1>

    <div id="setup-area">
        <input type="text" id="studentName" placeholder="Enter Full Name" style="width:100%; padding:15px; margin-bottom:15px; border-radius:8px; border:2px solid #4ade80; background:#1a1a2e; color:white; box-sizing: border-box; font-size: 16px;">
        <div id="level-selector-container"></div>
        <button class="btn btn-teacher" onclick="fetchLeaderboard()">📊 Teacher Dashboard</button>
    </div>

    <div id="game-area" class="hidden">
        <div style="display: flex; justify-content: space-between; width: 100%; max-width: 350px; align-items: center; margin-bottom: 5px;">
            <h3 id="topic-title" style="color: var(--secondary); margin: 0; font-size: 0.9em;">Topic</h3>
            <div id="lives-display" style="font-size: 20px;">❤️❤️❤️</div>
        </div>
        <div id="task-text">...</div>
        <div id="board-container"><div id="myBoard"></div></div>
        <h3 style="color:var(--secondary); text-align: center;">Mission Score: <span id="current-score">0</span></h3>
    </div>

    <div id="post-game" class="hidden" style="text-align: center; width: 95%; max-width: 400px;">
        <h2 style="color:var(--secondary); margin-bottom: 5px;">WEEK REPORT</h2>
        <div id="summary-container"></div>
        <h3 style="margin: 15px 0;">Total Points: <span id="final-points" style="color:var(--secondary)">0</span></h3>
        <button class="btn" onclick="fetchLeaderboard()">🏆 View Hall of Fame</button>
        <button class="btn" onclick="location.reload()">🔄 Play Again</button>
    </div>

    <div id="results-modal" class="hidden">
        <h3 style="color:var(--secondary); text-align: center; margin-top: 0;">🏆 Top Students</h3>
        <div id="leaderboard-data" style="text-align: center; padding: 20px;">Gathering Hall of Fame...</div>
        <button class="btn" onclick="document.getElementById('results-modal').classList.add('hidden')" style="margin-top: 15px;">Close</button>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCcSVTifrJhzXvhQ4m1UyObtCKd8QnKEUw",
          authDomain: "assignments-de95a.firebaseapp.com",
          projectId: "assignments-de95a",
          storageBucket: "assignments-de95a.firebasestorage.app",
          messagingSenderId: "1088073398299",
          appId: "1:1088073398299:web:dab1f57ac1d63b10dba0be"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const allQuestions = [
            // WEEK 1: The Great Capture (From original school (1).html)
            { level: 1, term: 1, week: 1, topic: "The Great Capture", fen: "r4rk1/1p2nppp/p1n1q3/3Pp3/8/2N2N1P/PP2QPP1/R4RK1 w - - 0 1", move: "d5e6", task: "Take the unprotected Queen!" },
            { level: 1, term: 1, week: 1, topic: "The Great Capture", fen: "r4rk1/1p2nppp/p1n5/3bp1q1/4P3/2N2N1P/PP2QPP1/R4RK1 w - - 0 1", move: "f3g5", task: "The Queen is hanging! Capture it." },
            { level: 1, term: 1, week: 1, topic: "The Great Capture", fen: "r4rk1/1p3ppp/p1n2n2/4p3/5p2/B1N2N1P/PP3PP1/R4RK1 w - - 0 1", move: "a3f8", task: "Win the Rook for free!" },
            { level: 1, term: 1, week: 1, topic: "The Great Capture", fen: "r1b2rk1/1p3ppp/p1n2n2/4p2R/3PPp2/B1N2N1Q/PP3PP1/R4RK1 w - - 0 1", move: "c8h3", task: "Black to move: Find White's Queen!" },
            { level: 1, term: 1, week: 1, topic: "The Great Capture", fen: "r1b2rk1/1p3ppp/p1nN1n2/4p1Q1/2qPPp2/5N2/PP3PP1/R4RK1 w - - 0 1", move: "d6c4", task: "Take the Black Queen!" },
            
            // WEEK 2: Development
            { level: 1, term: 1, week: 2, topic: "Development", fen: "r1bqkbnr/ppp2ppp/2npp3/8/4P3/3P1N2/PPP2PPP/RNBQKB1R w - - 0 1", move: "f1e2", task: "How should white develop his Bishop?" },
            { level: 1, term: 1, week: 2, topic: "Development", fen: "rnbqk1nr/ppp1bppp/3pp3/8/4P3/3P4/PPP1BPPP/RNBQK1NR w - - 0 1", move: "g1f3", task: "What knight should white develop?" },
            { level: 1, term: 1, week: 2, topic: "Development", fen: "r1bqk1nr/ppp1bppp/2npp3/8/4P3/3P1N2/PPP1BPPP/RNBQK2R w - - 0 1", move: "e1g1", task: "What's white's next move after developing the knight and bishop?" },
            { level: 1, term: 1, week: 2, topic: "Development", fen: "r1bq1rk1/ppp1bppp/2nppn2/8/4P3/3PNN2/PPP1BPPP/R1BQ1RK1 w - - 0 1", move: "c1d2", task: "How should white proceed in his development?" },
            { level: 1, term: 1, week: 2, topic: "Development", fen: "r2q1rk1/pppbbppp/2nppn2/6B1/4P3/2NP1N2/PPP1BPPP/R2Q1RK1 w - - 0 1", move: "d1d2", task: "How can White complete his development?" },

            // WEEK 3: Checkmate in One (From new chess_puzzles (4).json)
            { level: 1, term: 1, week: 3, topic: "Checkmate in One", fen: "5k2/1Q6/6K1/8/8/8/8/8 w - - 0 1", move: "b7f7", task: "Checkmate the black King" },
            { level: 1, term: 1, week: 3, topic: "Checkmate in One", fen: "6k1/5ppp/r7/8/8/7P/5P1P/1R4K1 w - - 0 1", move: "b1b8", task: "Checkmate the black King" },
            { level: 1, term: 1, week: 3, topic: "Checkmate in One", fen: "6k1/5ppp/r7/7q/5bQ1/7P/5P1P/1R4K1 w - - 0 1", move: "g4c8", task: "What is white's best move?" },
            { level: 1, term: 1, week: 3, topic: "Checkmate in One", fen: "r6k/R7/n4N2/8/8/7K/8/8 w - - 0 1", move: "a7h7", task: "How can white win the game" },
            { level: 1, term: 1, week: 3, topic: "Checkmate in One", fen: "3r3k/4qppp/8/8/4Q3/3B3P/6PK/8 w - - 0 1", move: "e4h7", task: "What's white's best move?" }
        ];

        let game = new Chess();
        let board, currentLevel, currentTerm, currentWeek, gradeSet, currentIdx, score, pName;
        let lives = 3;
        let squareSelected = null;
        let missionResults = [];

        function generateButtons() {
            const container = document.getElementById('level-selector-container');
            container.innerHTML = "";
            for (let L = 1; L <= 4; L++) {
                container.innerHTML += `<div class="section-label">LEVEL ${L}</div>`;
                for (let t = 1; t <= 3; t++) {
                    let grid = `<div style="font-size:0.7em; text-align:center; color:var(--secondary); margin-top:5px;">Term ${t}</div><div class="week-grid">`;
                    for (let w = 1; w <= 5; w++) {
                        grid += `<button class="btn" style="padding:5px; font-size:11px;" onclick="initMission(${L}, ${t}, ${w})">W${w}</button>`;
                    }
                    container.innerHTML += grid + `</div>`;
                }
            }
        }
        generateButtons();

        window.initMission = function(l, t, w) {
            pName = document.getElementById('studentName').value.trim();
            if(!pName) { alert("Please enter the child's name!"); return; }
            currentLevel=l; currentTerm=t; currentWeek=w;
            gradeSet = allQuestions.filter(q => q.level===l && q.term===t && q.week===w);
            if(!gradeSet.length) { alert("Coming Soon!"); return; }
            document.getElementById("setup-area").classList.add("hidden");
            document.getElementById("game-area").classList.remove("hidden");
            currentIdx=0; score=0; missionResults=[];
            loadQuestion();
        };

        function loadQuestion() {
            if(currentIdx >= gradeSet.length) { finishGame(); return; }
            lives = 3; updateLivesUI();
            const q = gradeSet[currentIdx];
            document.getElementById("topic-title").innerText = q.topic;
            document.getElementById("task-text").innerText = q.task;
            document.getElementById("current-score").innerText = score;

            game.load(q.fen);
            board = ChessBoard('myBoard', {
                draggable: false, position: q.fen,
                orientation: q.task.includes("Black") || q.task.includes("black") ? 'black' : 'white',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
            $('.square-55d63').off('click').on('click', handleMove);
        }

        function handleMove() {
            const sq = $(this).attr('data-square');
            if(!squareSelected) {
                if(game.get(sq)) { squareSelected=sq; $(`.square-${sq}`).addClass('highlight-selected'); }
            } else {
                const move = squareSelected + sq;
                $('.square-55d63').removeClass('highlight-selected');
                if(move === gradeSet[currentIdx].move) {
                    score++; missionResults.push({status: "Correct"});
                    currentIdx++; squareSelected=null;
                    setTimeout(loadQuestion, 300);
                } else {
                    lives--; updateLivesUI();
                    squareSelected = null;
                    if(lives <= 0) {
                        missionResults.push({status: "Incorrect"});
                        currentIdx++; setTimeout(loadQuestion, 300);
                    }
                }
            }
        }

        function updateLivesUI() { document.getElementById("lives-display").innerText = "❤️".repeat(lives); }

        async function finishGame() {
            let table = `<table class="summary-table"><tr><th>Mission</th><th>Result</th></tr>`;
            missionResults.forEach((r, i) => {
                table += `<tr><td>Question ${i+1}</td><td class="status-${r.status.toLowerCase()}">${r.status}</td></tr>`;
            });
            document.getElementById("summary-container").innerHTML = table + "</table>";
            document.getElementById("final-points").innerText = score;
            document.getElementById("game-area").classList.add("hidden");
            document.getElementById("post-game").classList.remove("hidden");

            const userRef = db.collection("student_progress").doc(pName.toLowerCase());
            const mKey = `L${currentLevel}T${currentTerm}W${currentWeek}`;
            
            try {
                await db.runTransaction(async (t) => {
                    const doc = await t.get(userRef);
                    if(!doc.exists) {
                        t.set(userRef, {name: pName, totalScore: score, completedMissions: [mKey]});
                    } else {
                        const data = doc.data();
                        if(!data.completedMissions.includes(mKey)) {
                            t.update(userRef, { 
                                totalScore: (data.totalScore || 0) + score, 
                                name: pName,
                                completedMissions: firebase.firestore.FieldValue.arrayUnion(mKey) 
                            });
                        }
                    }
                });
            } catch (e) { console.error("Database error:", e); }
        }

        window.fetchLeaderboard = function() {
            const listArea = document.getElementById('leaderboard-data');
            listArea.innerHTML = "Gathering Hall of Fame...";
            document.getElementById("results-modal").classList.remove("hidden");
            
            db.collection("student_progress")
              .limit(50) 
              .get()
              .then(snap => {
                let students = [];
                snap.forEach(d => {
                    let data = d.data();
                    students.push({
                        name: data.name || d.id,
                        score: data.totalScore || 0
                    });
                });

                students.sort((a, b) => b.score - a.score);

                let h = "";
                if (students.length === 0) {
                    h = "No scores yet. Be the first!";
                } else {
                    students.forEach(s => {
                       h += `<div class="leaderboard-entry">
                                <span class="name-tag" style="font-weight:bold; color:white;">${s.name}</span>
                                <span class="score-tag" style="color:#4ade80;">${s.score} Pts</span>
                             </div>`;
                    });
                }
                listArea.innerHTML = h;
              })
              .catch(err => {
                listArea.innerHTML = "Connection issue. Please try again.";
                console.error(err);
              });
        };
    </script>
</body>
</html>
