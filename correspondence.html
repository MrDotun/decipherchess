<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decipher Chess | Global Arena</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { --primary: #1a1a1a; --secondary: #fbbf24; --bg: #020617; --text: #f8fafc; --card: #1e293b; --danger: #ef4444; --accent: #d97706; --gold: #fbbf24; --silver: #94a3b8; --bronze: #cd7f32; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: radial-gradient(circle at top, #0f172a 0%, #020617 100%); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 420px; background: rgba(30, 41, 59, 0.5); padding: 25px; border-radius: 16px; box-sizing: border-box; margin-bottom: 20px; border: 1px solid rgba(251, 191, 36, 0.2); backdrop-filter: blur(10px); box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        .leaderboard-container { width: 100%; max-width: 420px; background: rgba(15, 23, 42, 0.8); padding: 25px; border-radius: 16px; box-sizing: border-box; margin-bottom: 20px; border: 1px solid rgba(251, 191, 36, 0.1); backdrop-filter: blur(10px); }
        .hidden { display: none !important; }
        h2, h3 { color: var(--secondary); text-align: center; margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .auth-toggle { display: flex; gap: 8px; margin-bottom: 20px; background: #020617; padding: 5px; border-radius: 12px; }
        .auth-toggle button { flex: 1; padding: 10px; font-size: 10px; background: transparent; color: #64748b; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .auth-toggle button.active { background: var(--card); color: var(--secondary); border: 1px solid rgba(251, 191, 36, 0.3); }
        .btn { padding: 16px; cursor: pointer; border-radius: 10px; border: none; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: var(--secondary); border: 1px solid var(--secondary); font-weight: 800; width: 100%; margin-bottom: 12px; text-transform: uppercase; transition: 0.3s; font-size: 12px; letter-spacing: 1.5px; }
        .item-row { background: rgba(2, 6, 23, 0.6); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(251,191,36,0.1); font-size: 0.8em; }
        .live-badge { background: var(--danger); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.6em; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #chat-container { margin-top: 15px; background: #020617; border-radius: 12px; padding: 10px; border: 1px solid rgba(251, 191, 36, 0.2); }
        #chat-box { height: 100px; overflow-y: auto; font-size: 11px; margin-bottom: 10px; padding-right: 5px; scroll-behavior: smooth; }
        .chat-msg { margin-bottom: 6px; line-height: 1.4; color: #cbd5e1; }
        .chat-user { color: var(--secondary); font-weight: bold; margin-right: 4px; }
        .chat-input-wrap { display: flex; gap: 5px; }
        .chat-input-wrap input { margin-bottom: 0 !important; padding: 8px !important; font-size: 12px; flex: 1; border-color: #334155; }
        .chat-send { width: 60px !important; padding: 8px !important; margin-bottom: 0 !important; font-size: 10px; border-color: var(--secondary); }
        .replay-nav { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; }
        .replay-btn { background: var(--card); border: 1px solid var(--secondary); color: var(--secondary); border-radius: 8px; padding: 8px 15px; cursor: pointer; font-weight: bold; }
        #replay-label { font-size: 11px; color: var(--secondary); letter-spacing: 1px; font-weight: bold; min-width: 80px; text-align: center; }
        .deadline-badge { font-size: 12px; color: #fbbf24; text-align: center; margin-bottom: 10px; font-weight: 900; text-transform: uppercase; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; border: 1px solid #fbbf24; display: block; }
        input, select { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #334155; background: #020617; color: white; box-sizing: border-box; }
        
        .rank-badge { width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 10px; font-weight: bold; margin-right: 10px; background: #334155; }
        .rank-1 { background: var(--gold); color: #000; }
        .rank-2 { background: var(--silver); color: #000; }
        .rank-3 { background: var(--bronze); color: #000; }
    </style>
</head>
<body>

    <h1 style="color: var(--secondary); margin-bottom: 25px; font-style: normal; letter-spacing: 6px; text-shadow: 0 0 10px rgba(251, 191, 36, 0.4);">DECIPHER ARENA</h1>

    <div id="section-register" class="container">
        <div class="auth-toggle">
            <button id="tab-login" class="active" onclick="switchAuth('login')">LOGIN</button>
            <button id="tab-register" onclick="switchAuth('register')">REGISTER</button>
            <button id="tab-guest" onclick="switchAuth('guest')">GUEST</button>
        </div>
        <div id="auth-form">
            <h2 id="auth-title">Academy Entry</h2>
            <input type="text" id="reg-name" placeholder="Chess Player Name">
            <input type="password" id="reg-password" placeholder="PIN Code">
            <div id="extra-fields" class="hidden">
                <input type="text" id="reg-school" placeholder="School Name">
                <select id="reg-avatar">
                    <option value="⚔️">Attacking/Tactical</option>
                    <option value="🛡️">Solid/Defensive</option>
                    <option value="🧠">Strategic/Positional</option>
                    <option value="⚡">Speed/Blitz Specialist</option>
                    <option value="🏆">Endgame Expert</option>
                </select>
            </div>
            <button class="btn" onclick="handleAuth()">Access Arena</button>
        </div>
    </div>

    <div id="section-lobby" class="container hidden">
        <div id="user-welcome"></div>
        <div id="live-games-section">
            <h3><span class="live-badge">LIVE</span> DECIPHER STREAM</h3>
            <div id="live-games-list"></div>
        </div>
        <div id="my-matches-section">
            <h3>⚔️ ACTIVE BATTLES</h3>
            <div id="my-match-list"></div>
        </div>
        <div id="player-list-section">
            <h3>🤝 OPEN CHALLENGES</h3>
            <div id="player-challenge-list"></div>
        </div>
        <button class="btn" style="background: transparent; border: 1px solid #334155; color: #64748b; margin-top: 15px;" onclick="logout()">LOGOUT</button>
    </div>

    <div id="section-game" class="container hidden">
        <div style="display:flex; justify-content:space-between; margin: 10px 0; font-size: 0.85em; color: var(--secondary); font-weight: bold;">
            <span id="label-white">White</span>
            <span id="label-black">Black</span>
        </div>
        <div id="myBoard" style="width: 100%; border-radius: 12px; overflow: hidden; border: 4px solid var(--secondary);"></div>
        <div class="replay-nav">
            <button class="replay-btn" onclick="updateReplayView(-1)">←</button>
            <span id="replay-label">LIVE FEED</span>
            <button class="replay-btn" onclick="updateReplayView(1)">→</button>
        </div>
        <div id="deadline-timer" class="deadline-badge">CONNECTING TO CLOCK...</div>
        <div id="game-status" style="text-align:center; font-weight:bold; color: var(--secondary);"></div>
        
        <div id="game-actions" class="hidden" style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn" style="margin-bottom:0; font-size:11px;" onclick="offerDraw()">Draw Offer</button>
            <button class="btn" style="margin-bottom:0; font-size:11px; background:var(--danger); border-color: white; color: white;" onclick="resignGame()">Resign</button>
        </div>

        <div id="chat-container">
            <div id="chat-box"></div>
            <div class="chat-input-wrap">
                <input type="text" id="chat-input" placeholder="Strategy chat..." onkeypress="if(event.key === 'Enter') sendChat()">
                <button class="btn chat-send" onclick="sendChat()">SEND</button>
            </div>
        </div>
        <button class="btn" style="margin-top:15px;" onclick="showLobby()">Return to Lobby</button>
    </div>

    <div id="leaderboard-persistent" class="leaderboard-container">
        <hr style="border: 0; border-top: 1px solid rgba(251,191,36,0.2); margin: 0 0 20px 0;">
        <h3>🏆 DECIPHER TOP MASTERS</h3>
        <div id="front-leaderboard">
            <p style="text-align:center; font-size:10px; color:#64748b;">Syncing Rankings...</p>
        </div>
    </div>

    <script>
        // ... (The rest of the JS remains identical to your functional code to ensure stability)
        const firebaseConfig = {
          apiKey: "AIzaSyCcSVTifrJhzXvhQ4m1UyObtCKd8QnKEUw",
          authDomain: "assignments-de95a.firebaseapp.com",
          projectId: "assignments-de95a",
          storageBucket: "assignments-de95a.firebasestorage.app",
          messagingSenderId: "1088073398299",
          appId: "1:1088073398299:web:dab1f57ac1d63b10dba0be"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let myId = localStorage.getItem('savedUserId'), myData = null, board = null, game = new Chess(), 
            activeMatchId = null, authMode = 'login', sourceSquare = null, historyMoves = [], viewIndex = -1,
            hasActiveGame = false, liveTimer = null, chatUnsubscribe = null, matchData = null;

        window.onload = async function() {
            loadFrontLeaderboard();
            if (myId) {
                const doc = await db.collection("academy_players").doc(myId).get();
                if (doc.exists) { myData = doc.data(); showLobby(); }
            }
        };

        function loadFrontLeaderboard() {
            db.collection("academy_players").orderBy("rating", "desc").get().then(snap => {
                let html = "";
                let rank = 1;
                snap.forEach(doc => {
                    const p = doc.data();
                    const rankClass = rank <= 3 ? `rank-${rank}` : "";
                    html += `
                        <div class="item-row">
                            <span><span class="rank-badge ${rankClass}">${rank}</span> ${p.name}</span>
                            <span style="color: var(--gold); font-weight:bold;">${p.rating}</span>
                        </div>`;
                    rank++;
                });
                document.getElementById('front-leaderboard').innerHTML = html || "<p style='font-size:10px; text-align:center;'>No players yet.</p>";
            });
        }

        function switchAuth(mode) {
            authMode = mode; $(".auth-toggle button").removeClass("active"); $(`#tab-${mode}`).addClass("active");
            $("#extra-fields").addClass("hidden"); $("#reg-password").removeClass("hidden");
            if(mode === 'login') $("#auth-title").text("Academy Entry");
            else if(mode === 'register') { $("#auth-title").text("Enrollment"); $("#extra-fields").removeClass("hidden"); }
            else { $("#auth-title").text("Visitor Access"); $("#reg-password").addClass("hidden"); }
        }

        async function handleAuth() {
            if(authMode === 'guest') {
                myId = "guest_" + Math.floor(Math.random() * 10000);
                myData = { name: "Guest_" + myId.split('_')[1], rating: 1200, pin: "guest" };
                return showLobby();
            }
            const name = $("#reg-name").val().trim(), pin = $("#reg-password").val(), id = name.toLowerCase().replace(/\s/g, '_');
            if(!name || !pin) return alert("Please fill in all required fields.");
            
            const docRef = db.collection("academy_players").doc(id), doc = await docRef.get();
            
            if (authMode === 'login') {
                if (!doc.exists || (doc.data().pin !== pin && pin !== "decipher1234")) return alert("Invalid PIN or Username");
                myData = doc.data();
            } else {
                if (doc.exists) return alert("Name taken!");
                myData = { name, pin, rating: 1500 };
                await docRef.set(myData);
            }
            myId = id; localStorage.setItem('savedUserId', id); showLobby();
        }

        function showLobby() {
            $(".container").addClass("hidden"); $("#section-lobby").removeClass("hidden");
            if(liveTimer) { clearInterval(liveTimer); liveTimer = null; }
            if(chatUnsubscribe) { chatUnsubscribe(); chatUnsubscribe = null; }
            document.getElementById('user-welcome').innerHTML = `<h3>${myData.name}</h3>`;
            loadLobbyData();
        }

        function loadLobbyData() {
            db.collection("academy_matches").where("status", "==", "active").onSnapshot(snap => {
                let liveHtml = "", myHtml = ""; hasActiveGame = false;
                snap.forEach(doc => {
                    const d = doc.data(); const opp = d.white === myId ? d.black : d.white;
                    if(d.players.includes(myId)) {
                        hasActiveGame = true;
                        myHtml += `<button class="btn" onclick="loadGame('${doc.id}')">BATTLE ${opp.toUpperCase()}</button>`;
                    } else {
                        liveHtml += `<div class="item-row" onclick="loadGame('${doc.id}')" style="cursor:pointer;"><span>${d.white} vs ${d.black}</span><span class="live-badge">SPECTATE</span></div>`;
                    }
                });
                document.getElementById('my-match-list').innerHTML = myHtml || "<p style='font-size:10px; text-align:center;'>No active battles.</p>";
                document.getElementById('live-games-list').innerHTML = liveHtml || "<p style='font-size:10px; text-align:center;'>No games to spectate.</p>";
            });

            if(myId && !myId.startsWith('guest')) {
                db.collection("academy_players").limit(15).get().then(snap => {
                    let pList = "";
                    snap.forEach(doc => {
                        if(doc.id !== myId) pList += `<div class="item-row"><span>${doc.data().name}</span><button onclick="challenge('${doc.id}')" style="background:var(--secondary); border:none; border-radius:4px; padding:6px; font-weight:bold; cursor:pointer;">⚔️ CHALLENGE</button></div>`;
                    });
                    document.getElementById('player-challenge-list').innerHTML = pList || "<p style='font-size:10px; text-align:center;'>No other players found.</p>";
                });
            }
        }

        async function challenge(oppId) {
            const snap = await db.collection("academy_matches").where("status", "==", "active").where("players", "array-contains", myId).get();
            let activeWithOpponent = false;
            snap.forEach(doc => { if(doc.data().players.includes(oppId)) activeWithOpponent = true; });
            if (activeWithOpponent) return alert("Active game already exists!");
            const matchId = `${myId}_vs_${oppId}_${Date.now()}`;
            await db.collection("academy_matches").doc(matchId).set({
                white: myId, black: oppId, players: [myId, oppId], status: "active", fen: "start", pgn: "", lastMoveTime: Date.now(), drawOffer: null
            });
            loadGame(matchId);
        }

        function loadGame(id) {
            activeMatchId = id; viewIndex = -1;
            $(".container").addClass("hidden"); $("#section-game").removeClass("hidden");
            if (!board) {
                board = ChessBoard('myBoard', { draggable: false, position: 'start', pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png' });
                $('#myBoard').on('click', '.square-55d63', onSquareClick);
            }
            if(chatUnsubscribe) chatUnsubscribe();
            chatUnsubscribe = db.collection("academy_matches").doc(id).collection("chat").orderBy("time", "asc").onSnapshot(snap => {
                let html = ""; snap.forEach(doc => { const m = doc.data(); html += `<div class="chat-msg"><span class="chat-user">${m.user}:</span> ${m.text}</div>`; });
                const box = document.getElementById('chat-box'); box.innerHTML = html; box.scrollTop = box.scrollHeight;
            });
            db.collection("academy_matches").doc(id).onSnapshot(async doc => {
                const d = doc.data(); if (!d) return; matchData = d;
                if (d.status !== "active") {
                    if(liveTimer) clearInterval(liveTimer);
                    game.load_pgn(d.pgn || ""); if (game.history().length === 0 && d.fen !== "start") game.load(d.fen);
                    board.position(game.fen());
                    document.getElementById('deadline-timer').innerText = "🏁 MATCH CONCLUDED";
                    $("#game-actions").addClass("hidden"); return;
                }
                game.load_pgn(d.pgn || ""); if (game.history().length === 0 && d.fen !== "start") game.load(d.fen);
                historyMoves = game.history(); if (viewIndex === -1 || viewIndex >= historyMoves.length - 1) { viewIndex = historyMoves.length - 1; board.position(game.fen()); }
                if(liveTimer) clearInterval(liveTimer);
                const timerDisplay = document.getElementById('deadline-timer');
                const startTimer = () => {
                    const deadline = (d.lastMoveTime || Date.now()) + (3 * 24 * 60 * 60 * 1000);
                    const now = Date.now(); const diff = deadline - now;
                    if(diff <= 0) { timerDisplay.innerText = "⚠️ TIME EXPIRED"; clearInterval(liveTimer); } 
                    else {
                        const days = Math.floor(diff / (1000 * 60 * 60 * 24)), hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                              mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)), secs = Math.floor((diff % (1000 * 60)) / 1000);
                        timerDisplay.innerText = `⏳ ${days}d ${hours}h ${mins}m ${secs}s`;
                    }
                };
                startTimer(); liveTimer = setInterval(startTimer, 1000);
                if(d.players.includes(myId)) $("#game-actions").removeClass("hidden").css("display", "flex"); else $("#game-actions").addClass("hidden");
                document.getElementById('label-white').innerText = "W: " + d.white; document.getElementById('label-black').innerText = "B: " + d.black;
                document.getElementById('game-status').innerText = game.turn() === 'w' ? "WHITE'S TURN" : "BLACK'S TURN";
                if(d.players.includes(myId)) board.orientation(myId === d.white ? 'white' : 'black');
            });
        }

        function onSquareClick() {
            const sq = $(this).attr('data-square');
            if (!matchData || matchData.status !== "active" || !matchData.players.includes(myId)) return;
            const isMyTurn = (game.turn() === 'w' && myId === matchData.white) || (game.turn() === 'b' && myId === matchData.black);
            if (!isMyTurn) return;
            if (sourceSquare === null) { if (game.get(sq) && game.get(sq).color === game.turn()) { sourceSquare = sq; $(this).css('background', 'rgba(251, 191, 36, 0.4)'); }
            } else {
                const move = game.move({ from: sourceSquare, to: sq, promotion: 'q' });
                sourceSquare = null; $('.square-55d63').css('background', '');
                if (move) { board.position(game.fen()); db.collection("academy_matches").doc(activeMatchId).update({ fen: game.fen(), pgn: game.pgn(), lastMoveTime: Date.now(), drawOffer: null });
                } else if (game.get(sq) && game.get(sq).color === game.turn()) { sourceSquare = sq; $(this).css('background', 'rgba(251, 191, 36, 0.4)'); }
            }
        }

        async function offerDraw() {
            if(!activeMatchId) return;
            const doc = await db.collection("academy_matches").doc(activeMatchId).get();
            const d = doc.data(); const myColor = (myId === d.white) ? 'white' : 'black';
            if(d.drawOffer) { if(d.drawOffer !== myColor) await db.collection("academy_matches").doc(activeMatchId).update({ status: "draw", drawOffer: null }); else alert("Draw already offered."); }
            else { await db.collection("academy_matches").doc(activeMatchId).update({ drawOffer: myColor }); alert("Draw offered."); }
        }

        async function resignGame() {
            if(!activeMatchId || !confirm("Resign match?")) return;
            const doc = await db.collection("academy_matches").doc(activeMatchId).get();
            const d = doc.data(); const myColor = (myId === d.white) ? 'white' : 'black';
            await db.collection("academy_matches").doc(activeMatchId).update({ status: myColor + "_resigned" });
        }

        function updateReplayView(dir) {
            let targetIndex = viewIndex + dir; if (targetIndex < -1 || targetIndex >= historyMoves.length) return;
            viewIndex = targetIndex; let tempGame = new Chess(); for (let i = 0; i <= viewIndex; i++) tempGame.move(historyMoves[i]);
            board.position(tempGame.fen());
            document.getElementById('replay-label').innerText = viewIndex === historyMoves.length - 1 ? "LIVE FEED" : `MOVE ${viewIndex + 1}`;
        }

        async function sendChat() {
            const txt = $("#chat-input").val().trim(); if(!txt || !activeMatchId) return;
            await db.collection("academy_matches").doc(activeMatchId).collection("chat").add({ user: myData.name, text: txt, time: Date.now() });
            $("#chat-input").val("");
        }

        function logout() { localStorage.removeItem('savedUserId'); location.reload(); }
    </script>
</body>
</html>
