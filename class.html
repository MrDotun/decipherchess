<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal | Maryland Convent</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --emerald: #004d40; --gold: #c5a059; --bg: #f1f5f9; --danger: #dc2626; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; font-size: 0.85rem; }
        
        /* LOGIN PANEL */
        #teacherLock { position: fixed; inset: 0; background: var(--emerald); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 35px; border-radius: 15px; width: 350px; text-align: center; border-bottom: 6px solid var(--gold); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        
        /* WORKSPACE */
        .container { max-width: 1100px; margin: auto; padding: 20px; display: none; }
        .header-bar { background: #1e293b; color: white; padding: 15px 25px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .mgmt-panel { background: white; padding: 20px; border-radius: 10px; display: flex; gap: 10px; margin-bottom: 20px; border: 1px solid #e2e8f0; align-items: center; }
        
        /* STUDENT CARDS */
        .student-card { background: white; border-radius: 10px; margin-bottom: 12px; border: 1px solid #e2e8f0; transition: 0.2s; }
        .card-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .pos-badge { font-size: 0.75rem; background: #e6f4ea; color: #004d40; padding: 4px 10px; border-radius: 20px; margin-right: 6px; font-weight: 700; border: 1px solid #c3e6cb; }
        .pos-annual { background: #fff7ed; color: #c2410c; border: 1px solid #fdba74; }
        
        /* TABLE STYLES */
        .subject-grid { width: 100%; border-collapse: collapse; display: none; background: #fff; border-top: 1px solid #eee; }
        .subject-grid th, .subject-grid td { border: 1px solid #f1f5f9; padding: 10px; text-align: center; }
        .score-edit { width: 45px; border: 1px solid #cbd5e1; text-align: center; font-weight: bold; border-radius: 4px; padding: 5px; background: #f8fafc; }
        
        .btn-save { background: var(--emerald); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-excel { background: #166534; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-delete { background: none; color: var(--danger); border: 1px solid #fecaca; padding: 8px; border-radius: 6px; cursor: pointer; margin-left: 10px; transition: 0.2s; }
        .btn-delete:hover { background: #fef2f2; }
        input[type="text"] { padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; }
    </style>
</head>
<body>

<div id="teacherLock">
    <div class="login-card">
        <h2 style="color: var(--emerald); margin-bottom: 5px;">Teacher Login</h2>
        <p style="color: #64748b; margin-bottom: 25px;">Maryland Convent Portal</p>
        
        <label>Grade Level</label>
        <select id="tGrade" style="width:100%; padding:12px; margin-bottom:15px; border-radius: 6px; border: 1px solid #ddd;">
            <option>Grade 1</option><option>Grade 2</option><option>Grade 3</option>
            <option>Grade 4</option><option>Grade 5</option><option>Grade 6</option>
        </select>

        <label>Class Arm</label>
        <select id="tArm" style="width:100%; padding:12px; margin-bottom:15px; border-radius: 6px; border: 1px solid #ddd;">
            <option>Blue</option><option>Green</option><option>Red</option><option>White</option>
        </select>

        <label>Access PIN</label>
        <input type="password" id="tPin" placeholder="Enter PIN" style="width:100%; padding:12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
        
        <button onclick="accessClass()" style="width:100%; background: var(--emerald); color: white; padding:15px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:25px; font-size: 1rem;">ACCESS DATABASE</button>
    </div>
</div>

<div class="container" id="mainWorkspace">
    <div class="header-bar">
        <span id="displayClass"><b>Class Workspace</b></span>
        <span>Maryland Convent Portal v2.0</span>
    </div>

    <div class="mgmt-panel">
        <input type="text" id="newStu" placeholder="Type Student's Full Name" style="flex:1;">
        <button onclick="addStu()" style="background:var(--emerald); color:white; border:none; padding:10px 25px; border-radius:6px; font-weight:bold; cursor:pointer;">+ ADD PUPIL</button>
        <button onclick="exportToExcel()" class="btn-excel"><i class="bi bi-file-earmark-spreadsheet"></i> EXPORT TO EXCEL</button>
    </div>
    
    <div id="studentList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBX_ysaY_ShUG1kY-ZR8xnaZ01SlZLUblw",
        authDomain: "assignments-de95a.firebaseapp.com",
        databaseURL: "https://assignments-de95a-default-rtdb.firebaseio.com",
        projectId: "assignments-de95a",
        storageBucket: "assignments-de95a.firebasestorage.app",
        messagingSenderId: "1088073398299",
        appId: "1:1088073398299:web:619884c11554d262dba0be"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const subjects = ["Maths", "English", "Science", "Social", "Civic", "Agric", "Home Ec", "PHE", "ICT", "CRK", "Yoruba", "Art", "Verbal", "Quant", "French", "Music", "Handwriting", "Diction", "History", "Literature"];
    let activeG = ""; let activeA = "";
    let currentStudentsData = []; // Store data for Excel export

    window.accessClass = async function() {
        const pin = document.getElementById('tPin').value;
        const g = document.getElementById('tGrade').value;
        const a = document.getElementById('tArm').value;
        const classID = (g + a).replace(" ", "");

        const pinRef = doc(db, "pins", classID);
        const pinSnap = await getDoc(pinRef);

        if (pinSnap.exists()) {
            if (pin === pinSnap.data().code) {
                activeG = g; activeA = a;
                document.getElementById('teacherLock').style.display = 'none';
                document.getElementById('mainWorkspace').style.display = 'block';
                document.getElementById('displayClass').innerHTML = `<b>${activeG} ${activeA}</b>`;
                renderTeacherView();
            } else { alert("Wrong PIN for " + g + " " + a); }
        } else {
            alert("No PIN set for this class. Contact the Principal.");
        }
    };

    window.addStu = async function() {
        const name = document.getElementById('newStu').value.trim();
        if(!name) return;
        const id = Date.now().toString();
        await setDoc(doc(db, "students", id), {
            id, name, grade: activeG, arm: activeA, scores: {}
        });
        document.getElementById('newStu').value = "";
        renderTeacherView();
    };

    window.saveData = async function(id) {
        const card = document.getElementById(`card-${id}`);
        const rows = card.querySelectorAll('tr[data-subject]');
        let scores = {};
        rows.forEach(r => {
            const sub = r.getAttribute('data-subject');
            scores[sub] = {
                t1: r.querySelector('.t1').value, e1: r.querySelector('.e1').value,
                t2: r.querySelector('.t2').value, e2: r.querySelector('.e2').value,
                t3: r.querySelector('.t3').value, e3: r.querySelector('.e3').value
            };
        });
        await setDoc(doc(db, "students", id), { scores }, { merge: true });
        alert("Cloud Sync Successful!");
        renderTeacherView(); 
    };

    window.deleteStu = async function(id, name) {
        if(confirm(`Delete ${name} permanently?`)) {
            await deleteDoc(doc(db, "students", id));
            renderTeacherView();
        }
    };

    // EXCEL EXPORT FUNCTION
    window.exportToExcel = function() {
        if(currentStudentsData.length === 0) return alert("No data to export");
        
        const worksheetData = currentStudentsData.map(s => ({
            "Student Name": s.name,
            "1st Term Total": s.t1_total,
            "2nd Term Total": s.t2_total,
            "3rd Term Total": s.t3_total,
            "Annual Total": s.annual_total
        }));

        const ws = XLSX.utils.json_to_sheet(worksheetData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Class Records");
        XLSX.writeFile(wb, `${activeG}_${activeA}_Records.xlsx`);
    };

    async function renderTeacherView() {
        const q = query(collection(db, "students"), where("grade", "==", activeG), where("arm", "==", activeA));
        const snap = await getDocs(q);
        const container = document.getElementById('studentList');
        container.innerHTML = "";

        let studentsList = [];
        snap.forEach(d => {
            let data = d.data();
            data.dbId = d.id;
            data.t1_total = 0; data.t2_total = 0; data.t3_total = 0; data.annual_total = 0;
            if (data.scores) {
                Object.values(data.scores).forEach(s => {
                    const s1 = (Number(s.t1)||0) + (Number(s.e1)||0);
                    const s2 = (Number(s.t2)||0) + (Number(s.e2)||0);
                    const s3 = (Number(s.t3)||0) + (Number(s.e3)||0);
                    data.t1_total += s1; data.t2_total += s2; data.t3_total += s3;
                    data.annual_total += (s1 + s2 + s3);
                });
            }
            studentsList.push(data);
        });

        currentStudentsData = studentsList; // Sync for export

        const getRank = (list, score, key) => {
            if (score === 0) return "--";
            const sorted = [...list].sort((a, b) => b[key] - a[key]);
            const rank = sorted.findIndex(x => x[key] === score) + 1;
            const j = rank % 10, k = rank % 100;
            if (j == 1 && k != 11) return rank + "st";
            if (j == 2 && k != 12) return rank + "nd";
            if (j == 3 && k != 13) return rank + "rd";
            return rank + "th";
        };

        studentsList.forEach(s => {
            let rows = "";
            subjects.forEach(sub => {
                const sc = (s.scores && s.scores[sub]) || {t1:'',e1:'',t2:'',e2:'',t3:'',e3:''};
                rows += `<tr data-subject="${sub}">
                    <td style="text-align:left; font-weight:bold;">${sub}</td>
                    <td><input type="number" class="score-edit t1" value="${sc.t1}"> <input type="number" class="score-edit e1" value="${sc.e1}"></td>
                    <td><input type="number" class="score-edit t2" value="${sc.t2}"> <input type="number" class="score-edit e2" value="${sc.e2}"></td>
                    <td><input type="number" class="score-edit t3" value="${sc.t3}"> <input type="number" class="score-edit e3" value="${sc.e3}"></td>
                </tr>`;
            });

            container.innerHTML += `
                <div class="student-card" id="card-${s.dbId}">
                    <div class="card-header">
                        <div onclick="toggle('${s.dbId}')" style="flex:1">
                            <b style="font-size:1.1rem; color:var(--emerald);">${s.name}</b>
                            <div style="margin-top:8px;">
                                <span class="pos-badge">1st: ${getRank(studentsList, s.t1_total, 't1_total')}</span>
                                <span class="pos-badge">2nd: ${getRank(studentsList, s.t2_total, 't2_total')}</span>
                                <span class="pos-badge">3rd: ${getRank(studentsList, s.t3_total, 't3_total')}</span>
                                <span class="pos-badge pos-annual">Annual: ${getRank(studentsList, s.annual_total, 'annual_total')}</span>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <button class="btn-save" onclick="saveData('${s.dbId}')">SAVE</button>
                            <button class="btn-delete" onclick="deleteStu('${s.dbId}', '${s.name}')"><i class="bi bi-trash"></i></button>
                        </div>
                    </div>
                    <table class="subject-grid" id="grid-${s.dbId}">
                        <tr style="background:#f1f5f9; font-size: 0.7rem; color: #475569;">
                            <th>SUBJECT NAME</th>
                            <th>1ST TERM (T/E)</th><th>2ND TERM (T/E)</th><th>3RD TERM (T/E)</th>
                        </tr>
                        ${rows}
                    </table>
                </div>`;
        });
    }

    window.toggle = (id) => {
        const g = document.getElementById('grid-'+id);
        g.style.display = g.style.display === 'table' ? 'none' : 'table';
    };
</script>
</body>
</html>
