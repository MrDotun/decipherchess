<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal | Maryland Convent</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --emerald: #004d40; --gold: #c5a059; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; font-size: 0.85rem; }
        
        /* BACKUP BAR */
        .backup-zone { background: #e2e8f0; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #cbd5e1; }
        .btn-backup { background: #1e293b; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.75rem; }
        .btn-restore { background: var(--gold); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.75rem; }

        .container { max-width: 1100px; margin: auto; padding: 15px; display: none; }
        #teacherLock { position: fixed; inset: 0; background: var(--emerald); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        
        /* TAB STYLING */
        .tab-menu { display: flex; background: white; border-bottom: 2px solid var(--gold); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; color: #64748b; }
        .tab-btn.active { color: var(--emerald); border-bottom: 4px solid var(--emerald); background: #f9fdfc; }

        /* SCORE GRID */
        .student-card { background: white; border-radius: 10px; margin-bottom: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
        .card-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .subject-grid { width: 100%; border-collapse: collapse; display: none; background: #fff; }
        .subject-grid th { background: #f8fafc; padding: 8px; font-size: 0.7rem; border: 1px solid #eee; }
        .subject-grid td { border: 1px solid #eee; padding: 4px; text-align: center; }
        .score-edit { width: 30px; border: 1px solid #ccc; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="teacherLock">
    <div style="background: white; padding: 30px; border-radius: 15px; width: 300px; text-align: center;">
        <h3 style="color: var(--emerald)">Teacher Login</h3>
        <select id="tGrade" style="width:100%; padding:10px; margin-bottom:10px;"><option>Grade 4</option></select>
        <select id="tArm" style="width:100%; padding:10px; margin-bottom:10px;"><option>Red</option></select>
        <input type="password" id="tPin" placeholder="PIN" style="width:100%; padding:10px; margin-bottom:10px;">
        <button onclick="accessClass()" style="width:100%; background: var(--emerald); color: white; padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">LOGIN</button>
    </div>
</div>

<div class="container" id="mainWorkspace">
    <div class="backup-zone">
        <span><i class="bi bi-shield-check"></i> <b>Data Protection Active</b></span>
        <div>
            <button class="btn-backup" onclick="downloadBackup()"><i class="bi bi-download"></i> DOWNLOAD DATA BACKUP</button>
            <button class="btn-restore" onclick="document.getElementById('importFile').click()"><i class="bi bi-upload"></i> RESTORE FROM WIPE</button>
            <input type="file" id="importFile" style="display:none" onchange="restoreBackup(event)">
        </div>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="showTab('entry')">Score Entry (All Terms)</button>
        <button class="tab-btn" onclick="showTab('ranking')">Rankings</button>
    </div>

    <div id="entryTab" style="margin-top: 20px;">
        <div id="studentListContainer"></div>
    </div>
</div>

<script>
    let currentGrade = "";
    let currentArm = "";
    const subjects = ["Maths", "English", "Science", "Social", "Civic", "Agric", "Home Ec", "PHE", "ICT", "CRK", "Language", "Art", "Verbal", "Quant", "French", "Music", "Handwriting", "Diction", "History", "Literature"];

    function accessClass() {
        currentGrade = document.getElementById('tGrade').value;
        currentArm = document.getElementById('tArm').value;
        document.getElementById('teacherLock').style.display = 'none';
        document.getElementById('mainWorkspace').style.display = 'block';
        loadStudents();
    }

    // --- NEW: BACKUP & RESTORE LOGIC ---
    function downloadBackup() {
        const data = localStorage.getItem('students') || '[]';
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `MCPS_Backup_${currentGrade}_${currentArm}_${new Date().toLocaleDateString()}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        alert("Backup Downloaded! Keep this file safe in case of a system wipe.");
    }

    function restoreBackup(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            try {
                localStorage.setItem('students', content);
                alert("Restoration Successful! Refreshing records...");
                loadStudents();
            } catch (err) {
                alert("Error: Invalid backup file.");
            }
        };
        reader.readAsText(file);
    }

    function loadStudents() {
        const students = JSON.parse(localStorage.getItem('students') || '[]');
        const filtered = students.filter(s => s.grade === currentGrade && s.arm === currentArm);
        const container = document.getElementById('studentListContainer');
        container.innerHTML = "";
        filtered.forEach(s => {
            let rowData = "";
            subjects.forEach(sub => {
                rowData += `<tr><td style="text-align:left; padding-left:10px;">${sub}</td><td><input class="score-edit"> <input class="score-edit"></td><td><input class="score-edit"> <input class="score-edit"></td><td><input class="score-edit"> <input class="score-edit"></td></tr>`;
            });
            container.innerHTML += `
                <div class="student-card">
                    <div class="card-header" onclick="toggleScores(this)">
                        <b>${s.name}</b> <i class="bi bi-chevron-down"></i>
                    </div>
                    <table class="subject-grid">
                        <tr><th>Subject</th><th>1st Term</th><th>2nd Term</th><th>3rd Term</th></tr>
                        ${rowData}
                    </table>
                </div>`;
        });
    }

    function toggleScores(el) {
        const grid = el.nextElementSibling;
        grid.style.display = grid.style.display === "table" ? "none" : "table";
    }

    function showTab(tab) { /* Tab switching logic */ }
</script>
</body>
</html>
