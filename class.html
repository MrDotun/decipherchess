
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Teacher | MCPS</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f4f8; }
        .card { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
        .btn { background: #004d40; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #004d40;">Teacher's Registry</h2>
        <p>Update student list for your assigned Arm.</p>
        <div class="form-group">
            <label>Student Name</label>
            <input type="text" id="sn" placeholder="Enter Full Name">
        </div>
        <div class="form-group">
            <label>Assigned Arm</label>
            <select><option>Grade 4 Blue</option><option>Grade 4 Green</option><option>Grade 4 White</option><option>Grade 4 Red</option></select>
        </div>
        <button class="btn" onclick="alert('Student record added to School Master List')">Add Student to Database</button>
    </div>
</body>
</html>
