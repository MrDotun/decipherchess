<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal | MCPS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --emerald: #004d40; --gold: #c5a059; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; font-size: 0.85rem; }
        
        /* THE LOCK SCREEN */
        #teacherLock { position: fixed; inset: 0; background: var(--emerald); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 30px; border-radius: 15px; width: 320px; text-align: center; border-bottom: 5px solid var(--gold); }
        .error-msg { color: #ef4444; font-weight: bold; display: none; margin-top: 10px; font-size: 0.8rem; }

        /* Navigation Tabs */
        .tab-menu { display: flex; background: white; border-bottom: 2px solid var(--gold); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; color: #64748b; }
        .tab-btn.active { color: var(--emerald); border-bottom: 4px solid var(--emerald); background: #f9fdfc; }

        .container { max-width: 1000px; margin: auto; padding: 15px; display: none; }
        
        /* Subject Grid Styling */
        .student-card { background: white; border-radius: 8px; margin-bottom: 8px; border: 1px solid #e2e8f0; }
        .card-header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .subject-grid { width: 100%; border-collapse: collapse; display: none; padding: 15px; background: #fff; }
        .subject-grid th, .subject-grid td { border: 1px solid #eee; padding: 6px; text-align: center; }
        .score-edit { width: 35px; border: 1px solid #ddd; border-radius: 3px; text-align: center; padding: 2px; }

        /* Ranking Table */
        .rank-table { width: 100%; background: white; border-radius: 10px; overflow: hidden; border-collapse: collapse; }
        .rank-table th { background: var(--emerald); color: white; padding: 12px; }
        .rank-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

<div id="teacherLock">
    <div class="login-card" id="loginBox">
        <i class="bi bi-shield-lock-fill" style="font-size: 3rem; color: var(--emerald)"></i>
        <h3 style="color: var(--emerald); margin-top:10px;">Teacher Access</h3>
        
        <select id="tGrade" style="width:100%; padding:10px; margin-bottom:10px;">
            <option>Grade 1</option><option>Grade 2</option><option>Grade 3</option>
            <option>Grade 4</option><option>Grade 5</option><option>Grade 6</option>
        </select>
        
        <select id="tArm" style="width:100%; padding:10px; margin-bottom:10px;">
            <option>Blue</option><option>Green</option><option>Red</option><option>White</option>
        </select>
        
        <input type="password" id="tPin" placeholder="Enter Class PIN" style="width:100%; padding:10px; margin-bottom:5px; border-radius:5px; border:1px solid #ddd;">
        
        <div id="pinError" class="error-msg">
            <i class="bi bi-x-circle-fill"></i> Access Denied: Incorrect PIN
        </div>

        <button onclick="accessClass()" style="width:100%; background: var(--emerald); color: white; padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:15px;">
            OPEN REGISTER
        </button>
    </div>
</div>

<div class="container" id="mainWorkspace">
    <div class="tab-menu">
        <button class="tab-btn active" onclick="showTab('entry')">Score Entry (20 Subjects)</button>
        <button class="tab-btn" onclick="showTab('ranking')">Rankings & Positions</button>
    </div>

    <div id="entryTab" style="margin-top: 20px;">
        <div id="studentListContainer"></div>
    </div>

    <div id="rankingTab" style="margin-top: 20px; display: none;">
        <table class="rank-table">
            <thead>
                <tr><th>Pos</th><th>Student Name</th><th>Avg</th><th>Total</th></tr>
            </thead>
            <tbody id="rankBody"></tbody>
        </table>
    </div>
</div>

<script>
    let currentGrade = "";
    let currentArm = "";

    function accessClass() {
        const pinInput = document.getElementById('tPin').value;
        const grade = document.getElementById('tGrade').value;
        const arm = document.getElementById('tArm').value;
        const errorMsg = document.getElementById('pinError');
        
        // Structure check: pulls the PIN from the Admin's stored memory
        const classID = grade.replace(" ", "") + arm;
        const correctPin = localStorage.getItem(`pin_${classID}`);

        if(pinInput === correctPin) {
            currentGrade = grade;
            currentArm = arm;
            errorMsg.style.display = 'none';
            document.getElementById('teacherLock').style.display = 'none';
            document.getElementById('mainWorkspace').style.display = 'block';
            loadStudents();
        } else {
            // THE WRONG PIN PART
            errorMsg.style.display = 'block';
            document.getElementById('loginBox').style.borderColor = "#ef4444";
            // Visual "Shake" effect logic could go here
        }
    }

    // (Remaining functions for loadStudents, showTab, and calculatePositions kept as per previous version)
</script>
</body>
</html>
