<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maryland Convent | Integrated Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --emerald: #004d40; --gold: #c5a059; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; font-size: 0.85rem; }
        .container { max-width: 1200px; margin: auto; padding: 15px; }
        
        /* LOGIN GATES */
        #teacherLock, #parentGate { background: white; padding: 30px; border-radius: 15px; width: 340px; margin: 50px auto; text-align: center; border-bottom: 5px solid var(--gold); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none; }

        /* INTERFACE */
        .student-card { background: white; border-radius: 8px; margin-bottom: 10px; border: 1px solid #e2e8f0; overflow: hidden; }
        .card-header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #fff; }
        .subject-grid { width: 100%; border-collapse: collapse; display: none; background: #fff; }
        .subject-grid th, .subject-grid td { border: 1px solid #eee; padding: 6px; text-align: center; }
        .score-edit { width: 35px; border: 1px solid #ccc; text-align: center; border-radius: 3px; }
        
        .btn-main { background: var(--emerald); color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-save { background: var(--emerald); color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        
        /* REPORT VIEW */
        #reportSheet { background: white; padding: 40px; max-width: 800px; margin: auto; border: 1px solid #ddd; }
        @media print { .no-print { display: none; } #reportSheet { border: none; padding: 0; } }
    </style>
</head>
<body>

<div id="teacherLock" class="no-print">
    <h3 style="color: var(--emerald)">Teacher Access</h3>
    <select id="tGrade" style="width:100%; padding:8px; margin-bottom:10px;">
        <option>Grade 1</option><option>Grade 2</option><option>Grade 3</option>
    </select>
    <select id="tArm" style="width:100%; padding:8px; margin-bottom:10px;">
        <option>Blue</option><option>Green</option><option>Red</option>
    </select>
    <input type="password" id="tPin" placeholder="Class PIN" style="width:100%; padding:8px; border:1px solid #ddd;">
    <button class="btn-main" onclick="accessClass()">OPEN TEACHER PORTAL</button>
</div>

<div class="container hidden" id="mainWorkspace">
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <input type="text" id="newStu" placeholder="Full Student Name" style="flex:1; padding:10px;">
        <button onclick="addStu()" style="background:var(--emerald); color:white; border:none; padding:10px 20px; border-radius:5px;">ADD STUDENT</button>
    </div>
    <div id="studentList"></div>
</div>

<div id="parentGate" class="no-print hidden">
    <h3 style="color: var(--emerald)">Parent Portal</h3>
    <input type="text" id="pName" placeholder="Student's Name" style="width:100%; padding:8px; margin-bottom:10px;">
    <input type="password" id="pCode" placeholder="Code (1122)" style="width:100%; padding:8px; margin-bottom:10px;">
    <button class="btn-main" onclick="verifyResult()">VIEW RESULT</button>
</div>

<div id="reportSheet" class="hidden">
    <h2 style="text-align:center; color:var(--emerald);">Maryland Convent Report Sheet</h2>
    <p><b>Student:</b> <span id="outName"></span></p>
    <table id="pResultTable" style="width:100%; border-collapse:collapse;">
        <thead><tr style="background:#f1f1f1;"><th>Subject</th><th>T1</th><th>T2</th><th>T3</th><th>Avg</th></tr></thead>
        <tbody id="pResBody"></tbody>
    </table>
    <button class="no-print btn-main" style="background:var(--gold)" onclick="window.print()">PRINT/PDF</button>
</div>

<script type="module">
    // 1. Firebase Setup
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBX_ysaY_ShUG1kY-ZR8xnaZ01SlZLUblw",
        authDomain: "assignments-de95a.firebaseapp.com",
        databaseURL: "https://assignments-de95a-default-rtdb.firebaseio.com",
        projectId: "assignments-de95a",
        storageBucket: "assignments-de95a.firebasestorage.app",
        messagingSenderId: "1088073398299",
        appId: "1:1088073398299:web:619884c11554d262dba0be"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const subjects = ["Maths", "English", "Science", "Social", "Civic", "Agric", "Home Ec", "PHE", "ICT", "CRK", "Yoruba", "Art", "Verbal", "Quant", "French", "Music", "Handwriting", "Diction", "History", "Literature"];
    let activeG = ""; let activeA = "";

    // 2. TEACHER FUNCTIONS
    window.accessClass = function() {
        const pin = document.getElementById('tPin').value;
        if(pin === "1234") { // Replace with your logic
            activeG = document.getElementById('tGrade').value;
            activeA = document.getElementById('tArm').value;
            document.getElementById('teacherLock').classList.add('hidden');
            document.getElementById('mainWorkspace').classList.remove('hidden');
            renderTeacherView();
        } else { alert("Wrong PIN"); }
    };

    window.addStu = async function() {
        const name = document.getElementById('newStu').value;
        if(!name) return;
        const id = Date.now().toString();
        await setDoc(doc(db, "students", id), { name, grade: activeG, arm: activeA, scores: {} });
        document.getElementById('newStu').value = "";
        renderTeacherView();
    };

    window.saveData = async function(id) {
        const card = document.getElementById(`card-${id}`);
        const rows = card.querySelectorAll('tr[data-subject]');
        let scores = {};
        rows.forEach(r => {
            const sub = r.getAttribute('data-subject');
            scores[sub] = {
                t1: r.querySelector('.t1').value, e1: r.querySelector('.e1').value,
                t2: r.querySelector('.t2').value, e2: r.querySelector('.e2').value,
                t3: r.querySelector('.t3').value, e3: r.querySelector('.e3').value
            };
        });
        await setDoc(doc(db, "students", id), { scores }, { merge: true });
        alert("Saved to Cloud!");
    };

    async function renderTeacherView() {
        const q = query(collection(db, "students"), where("grade", "==", activeG), where("arm", "==", activeA));
        const snap = await getDocs(q);
        const container = document.getElementById('studentList');
        container.innerHTML = "";
        snap.forEach(d => {
            const s = d.data();
            let rows = "";
            subjects.forEach(sub => {
                const sc = (s.scores && s.scores[sub]) || {t1:'',e1:'',t2:'',e2:'',t3:'',e3:''};
                rows += `<tr data-subject="${sub}">
                    <td style="text-align:left;">${sub}</td>
                    <td><input type="number" class="score-edit t1" value="${sc.t1}"> <input type="number" class="score-edit e1" value="${sc.e1}"></td>
                    <td><input type="number" class="score-edit t2" value="${sc.t2}"> <input type="number" class="score-edit e2" value="${sc.e2}"></td>
                    <td><input type="number" class="score-edit t3" value="${sc.t3}"> <input type="number" class="score-edit e3" value="${sc.e3}"></td>
                </tr>`;
            });
            container.innerHTML += `<div class="student-card" id="card-${d.id}">
                <div class="card-header" onclick="toggle('${d.id}')"><b>${s.name}</b> <button class="btn-save" onclick="saveData('${d.id}')">SAVE</button></div>
                <table class="subject-grid" id="grid-${d.id}">${rows}</table>
            </div>`;
        });
    }

    // 3. PARENT FUNCTIONS
    window.verifyResult = async function() {
        const name = document.getElementById('pName').value.trim();
        const code = document.getElementById('pCode').value;
        if(code !== "1122") { alert("Wrong Code"); return; }
        
        const q = query(collection(db, "students"), where("name", "==", name));
        const snap = await getDocs(q);
        if(!snap.empty) {
            const data = snap.docs[0].data();
            document.getElementById('parentGate').classList.add('hidden');
            document.getElementById('reportSheet').classList.remove('hidden');
            document.getElementById('outName').innerText = data.name;
            const resBody = document.getElementById('pResBody');
            resBody.innerHTML = "";
            subjects.forEach(sub => {
                const sc = (data.scores && data.scores[sub]) || {t1:0,e1:0,t2:0,e2:0,t3:0,e3:0};
                const avg = ((Number(sc.t1)+Number(sc.e1)+Number(sc.t2)+Number(sc.e2)+Number(sc.t3)+Number(sc.e3))/3).toFixed(1);
                resBody.innerHTML += `<tr><td>${sub}</td><td>${sc.t1}/${sc.e1}</td><td>${sc.t2}/${sc.e2}</td><td>${sc.t3}/${sc.e3}</td><td>${avg}</td></tr>`;
            });
        } else { alert("Student not found"); }
    };

    window.toggle = (id) => {
        const g = document.getElementById('grid-'+id);
        g.style.display = g.style.display === 'table' ? 'none' : 'table';
    };
</script>
</body>
</html>
