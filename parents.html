<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Portal | Maryland Convent</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --emerald: #004d40; --gold: #c5a059; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: #1e293b; }
        
        .login-gate { max-width: 400px; margin: 60px auto; background: white; padding: 30px; border-radius: 15px; border-bottom: 5px solid var(--gold); box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 0.75rem; font-weight: bold; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        
        .btn-view { background: var(--emerald); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        
        /* REPORT SHEET STYLES */
        #reportSheet { max-width: 850px; margin: 20px auto; background: white; padding: 40px; border-radius: 10px; display: none; }
        .report-header { text-align: center; border-bottom: 2px solid var(--emerald); padding-bottom: 20px; margin-bottom: 20px; }
        .student-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 8px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--emerald); color: white; padding: 12px; font-size: 0.8rem; }
        td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; font-size: 0.85rem; }
        .sub-name { text-align: left; font-weight: bold; }
        .pos-box { background: #fff; border: 2px solid var(--gold); padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; }

        @media print { .no-print { display: none; } #reportSheet { margin: 0; padding: 0; } }
    </style>
</head>
<body>

<div class="login-gate no-print" id="loginGate">
    <img src="https://via.placeholder.com/80" alt="Logo" style="margin-bottom:10px; border-radius:50%;">
    <h2 style="color: var(--emerald); margin: 0;">Parent Portal</h2>
    <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 25px;">Maryland Convent Result Checker</p>

    <div class="input-group">
        <label>Student's Full Name</label>
        <input type="text" id="pName" placeholder="Enter as written by teacher">
    </div>

    <div class="input-group">
        <label>Class & Arm</label>
        <div style="display:flex; gap:10px;">
            <select id="pGrade"><option>Grade 1</option><option>Grade 2</option><option>Grade 3</option><option>Grade 4</option><option>Grade 5</option><option>Grade 6</option></select>
            <select id="pArm"><option>Blue</option><option>Green</option><option>Red</option><option>White</option></select>
        </div>
    </div>

    <div class="input-group">
        <label>Access Code</label>
        <input type="password" id="pCode" placeholder="Enter 4-digit code">
    </div>

    <button class="btn-view" onclick="checkResult()">VIEW REPORT SHEET</button>
</div>

<div id="reportSheet">
    <div class="report-header">
        <h1 style="color: var(--emerald); margin:0;">MARYLAND CONVENT</h1>
        <p style="margin:5px 0; color: #64748b;">Academic Performance Report</p>
    </div>

    <div class="student-info">
        <div><b>Name:</b> <span id="outName">---</span></div>
        <div><b>Class:</b> <span id="outClass">---</span></div>
        <div class="pos-box">1st Term Pos: <span id="pos1">--</span></div>
        <div class="pos-box">2nd Term Pos: <span id="pos2">--</span></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>SUBJECT</th>
                <th>1ST TERM</th>
                <th>2ND TERM</th>
                <th>3RD TERM</th>
                <th>ANNUAL AVG</th>
            </tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>

    <div style="margin-top:30px; display:flex; justify-content: space-between;" class="no-print">
        <button onclick="location.reload()" style="padding:10px; border:none; cursor:pointer;">← Back</button>
        <button onclick="window.print()" style="background:var(--gold); color:white; padding:10px 30px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">PRINT REPORT</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBX_ysaY_ShUG1kY-ZR8xnaZ01SlZLUblw",
        authDomain: "assignments-de95a.firebaseapp.com",
        projectId: "assignments-de95a",
        appId: "1:1088073398299:web:619884c11554d262dba0be"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const subjects = ["Maths", "English", "Science", "Social", "Civic", "Agric", "Home Ec", "PHE", "ICT", "CRK", "Yoruba", "Art", "Verbal", "Quant", "French", "Music", "Handwriting", "Diction", "History", "Literature"];

    window.checkResult = async function() {
        const name = document.getElementById('pName').value.trim();
        const grade = document.getElementById('pGrade').value;
        const arm = document.getElementById('pArm').value;
        const code = document.getElementById('pCode').value;

        if(code !== "1122") { alert("Invalid Access Code"); return; }

        // 1. Fetch all students in that class to calculate ranking
        const q = query(collection(db, "students"), where("grade", "==", grade), where("arm", "==", arm));
        const snap = await getDocs(q);
        
        let allStudents = [];
        let targetStudent = null;

        snap.forEach(doc => {
            let data = doc.data();
            data.t1_tot = 0; data.t2_tot = 0;
            if(data.scores) {
                Object.values(data.scores).forEach(s => {
                    data.t1_tot += (Number(s.t1)||0) + (Number(s.e1)||0);
                    data.t2_tot += (Number(s.t2)||0) + (Number(s.e2)||0);
                });
            }
            allStudents.push(data);
            if(data.name.toLowerCase() === name.toLowerCase()) targetStudent = data;
        });

        if(!targetStudent) { alert("Student record not found. Check spelling."); return; }

        // 2. Ranking Logic
        const getRank = (list, score, key) => {
            if(score === 0) return "--";
            const sorted = [...list].sort((a,b) => b[key] - a[key]);
            return sorted.findIndex(x => x[key] === score) + 1;
        };

        // 3. Display Data
        document.getElementById('loginGate').style.display = 'none';
        document.getElementById('reportSheet').style.display = 'block';
        document.getElementById('outName').innerText = targetStudent.name;
        document.getElementById('outClass').innerText = `${grade} ${arm}`;
        document.getElementById('pos1').innerText = getRank(allStudents, targetStudent.t1_tot, 't1_tot');
        document.getElementById('pos2').innerText = getRank(allStudents, targetStudent.t2_tot, 't2_tot');

        const tbody = document.getElementById('resBody');
        tbody.innerHTML = "";
        subjects.forEach(sub => {
            const sc = (targetStudent.scores && targetStudent.scores[sub]) || {t1:0,e1:0,t2:0,e2:0,t3:0,e3:0};
            const annual = ((Number(sc.t1)+Number(sc.e1)+Number(sc.t2)+Number(sc.e2))/2).toFixed(1);
            tbody.innerHTML += `
                <tr>
                    <td class="sub-name">${sub}</td>
                    <td>${sc.t1 || 0} / ${sc.e1 || 0}</td>
                    <td>${sc.t2 || 0} / ${sc.e2 || 0}</td>
                    <td>${sc.t3 || 0} / ${sc.e3 || 0}</td>
                    <td style="background:#f8fafc; font-weight:bold;">${annual}</td>
                </tr>`;
        });
    }
</script>
</body>
</html>
