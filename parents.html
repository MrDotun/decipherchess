
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Access | MCPS</title>
    <style>
        body { font-family: sans-serif; background: #fdfbf7; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border: 2px solid #004d40; border-radius: 20px; text-align: center; width: 320px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #004d40; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; }
        #report { display: none; background: white; padding: 40px; border: 5px double #004d40; width: 80%; }
    </style>
</head>
<body>
    <div class="login-card" id="lock">
        <h3 style="color:#004d40">Parent Login</h3>
        <p>Enter Student Registration ID or PIN</p>
        <input type="password" id="pin" placeholder="Student PIN">
        <button onclick="auth()">VIEW RESULT</button>
    </div>

    <div id="report">
        <h2 style="text-align:center">MD. CONVENT PRIVATE SCHOOL</h2>
        <hr>
        <p>Student: <b>Bello Amina</b></p>
        <p>Result Status: <b>PASSED</b></p>
        <button onclick="window.print()">Print Report Card</button>
    </div>

    <script>
        function auth() {
            if(document.getElementById('pin').value === "3333") {
                document.getElementById('lock').style.display = 'none';
                document.getElementById('report').style.display = 'block';
            } else { alert("Result Locked. Please contact Finance Dept."); }
        }
    </script>
</body>
</html>
